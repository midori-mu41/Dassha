// 角度差を -PI..PI の範囲で返す
function angleDiff(from, to){
    let d = to - from;
    while(d > Math.PI) d -= Math.PI * 2;
    while(d < -Math.PI) d += Math.PI * 2;
    return d;
}

/* ===== UPDATE ===== */
function update(now){
    // ── バックグラウンド対策: deltaTimeを最大50ms(約2フレーム)に制限 ──
    if(lastFrameTime===0) lastFrameTime=now;
    const rawDelta=now-lastFrameTime;
    lastFrameTime=now;
    // タブが非表示だったり重いフレームは最大50msに制限
    const dt=Math.min(rawDelta, 50);

    tickCount++;

    // ── 死亡演出シーケンス ──
    if(deathSequence){
        deathTimer++;
        const TOTAL=120; // 約2秒（60fps基準）
        const zp=Math.min(deathTimer/80,1);
        const eased=1-Math.pow(1-zp,2.5);

        if(tickCount%30===0){
            spawnParticles(deathPlayerX,deathPlayerY,2,'#f55',rand(2,7),rand(40,100));
            spawnParticles(deathPlayerX,deathPlayerY,2,'#faa',rand(1,4),rand(50,120));
        }
        if(tickCount%999===0)shockwaves.push({x:deathPlayerX,y:deathPlayerY,r:0,maxR:80,life:25,maxLife:25,color:'rgba(255,80,80'});
        if(tickCount%999===0)explosions.push({
            x:deathPlayerX+(Math.random()-0.5)*40,
            y:deathPlayerY+(Math.random()-0.5)*40,
            r:0,max:50,life:40
        });
        const sf=0.15;
        particles.forEach(p=>{p.x+=p.vx*sf;p.y+=p.vy*sf;p.vx*=0.94;p.vy*=0.94;p.life-=sf;});
        particles=particles.filter(p=>p.life>0);
        explosions.forEach(ex=>{ex.r+=1.5*sf;ex.life-=sf;});
        explosions=explosions.filter(ex=>ex.life>0);
        shockwaves.forEach(sw=>{sw.r+=sw.maxR/sw.maxLife*sf*2;sw.life-=sf;});
        shockwaves=shockwaves.filter(sw=>sw.life>0);
        flash-=0.5;invincible--;
        if(deathTimer>=TOTAL)gameOver();
        return;
    }

    // ── 通常ゲーム時間加算（slowMotion考慮） ──
    const sf=slowMotion>0?0.3:1;
    const effectiveDt=dt*sf;
    gameTime+=effectiveDt;  // ms単位で累積

    // ── フィールド拡大システム ──
    // fieldSize: world空間の有効半辺サイズ（初期=FIELD_BASE、時間で段階的に増大）
    // 描画時は枠スクリーンサイズを固定し scale(FIELD_SCREEN/fieldSize) を使う
    // → fieldSizeが大きいほどオブジェクトが小さく見える = 相対的にフィールドが広がる感覚
    // 段階的に増加: 30秒ごとに +75 (最大600)
    const growStep = 30;
    const growAmount = 75;
    const maxFieldSize = FIELD_BASE * 3;
    const stages = Math.floor(gameTime / (growStep * 1000));
    const newFieldSize = Math.min(FIELD_BASE + stages * growAmount, maxFieldSize);
    if(newFieldSize > fieldSize){ sfxFieldExpand(); }
    fieldSize = newFieldSize;

    // Live timer (gameTime はスロー補正済みなので実時間より遅い。実表示はeffectiveTime)
    // 表示用はスローを除いた純粋生存時間にしたいので別途累積
    // 簡易実装: gameTime/sfの平均は複雑なので rawTime で表示のみに使う
    const dispMs=Math.floor(gameTime%1000);
    const dispSec=Math.floor((gameTime/1000)%60);
    const dispMin=Math.floor(gameTime/60000);
    document.getElementById("live-timer").textContent=
        String(dispMin).padStart(2,'0')+':'+String(dispSec).padStart(2,'0')+'.'+String(dispMs).padStart(3,'0');

    // フレーム係数: dt基準で物理量をスケール (60fps基準=16.67ms)
    const fps60=dt/16.667*sf;

    // ── プレイヤー移動 ──
    const anchorMaxDist=fieldSize*0.8;
    const prevX=player.x,prevY=player.y;
    if(charType===0&&clickMove){
        player.x+=(tx-player.x)*0.15*fps60;
        player.y+=(ty-player.y)*0.15*fps60;
        if(Math.hypot(tx-player.x,ty-player.y)<2)clickMove=false;
    }
    if(charType===1){
        player.x+=Math.cos(player.angle)*4.2*fps60;
        player.y+=Math.sin(player.angle)*4.2*fps60;
    }
    if(charType===2){
    if(anchorPressed){
        anchorCurrentDist = Math.min(anchorMaxDist, anchorCurrentDist + 2*fps60);
    } else {
        anchorCurrentDist = Math.max(0, anchorCurrentDist - 2.5*fps60);
    }

    // ここで角度をゆっくり合わせる
    // 回転速度 (rad/frame 相当、60fps基準) — 値を小さくするとよりゆっくり回る
    const ANCHOR_ROT_SPEED = 0.12; // 調整可（例: 0.05〜0.25 の範囲で試してみて）
    const diff = angleDiff(player.angle, anchorTargetAngle);
    const maxRot = ANCHOR_ROT_SPEED * fps60; // fps60でスケール
    if(Math.abs(diff) > 0.0001){
        player.angle += Math.sign(diff) * Math.min(Math.abs(diff), maxRot);
        // 角度を正規化しておく（見た目の安定のため）
        if(player.angle > Math.PI) player.angle -= Math.PI*2;
        if(player.angle < -Math.PI) player.angle += Math.PI*2;
    }

    player.x = Math.cos(player.angle) * anchorCurrentDist;
    player.y = Math.sin(player.angle) * anchorCurrentDist;
    }
    // ORBITER: 衛星がマウス中心点を周回しながら追従
    // player.x/y = 衛星の実際の当たり判定位置
    if(charType===3){
        orbiterAngle+=ORBIT_SPEED*fps60;
        // 中心点をゆっくり追従（慣性あり）
        player.x=orbiterCenterX+Math.cos(orbiterAngle)*ORBIT_RADIUS;
        player.y=orbiterCenterY+Math.sin(orbiterAngle)*ORBIT_RADIUS;
    }
    // WARPER: クールダウン管理のみ（移動はhandleDownで瞬間実行）
    if(charType===4){
        if(warperCD>0) warperCD-=fps60;
    }
    // フィールド境界: FIELD_BASE固定（zoomによって広がらない）
    const limit=fieldSize-10;
    player.x=Math.max(-limit,Math.min(limit,player.x));
    player.y=Math.max(-limit,Math.min(limit,player.y));

    // プレイヤートレイル
    if(Math.hypot(player.x-prevX,player.y-prevY)>0.5*fps60){
        trails.push({x:prevX,y:prevY,life:14,maxLife:14});
    }

    if(typeof window.lastMaxType === "undefined") window.lastMaxType = 0;

    // ── 敵スポーン ──
    const maxType=Math.min(12,Math.floor(gameTime/9000));
    if(enemies.length<3+gameTime/2500)spawnEnemy(maxType);

    if(maxType > window.lastMaxType){
        spawnEnemy(maxType); // 1回だけ即生成
        window.lastMaxType = maxType;
    }

    // ── 敵処理 ──
    enemies.forEach(e=>{
        if(e.spawnFlash>0)e.spawnFlash--;
        e.cd-=fps60;
        const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy)+0.001;
        switch(e.type){
            case 0:
                e.x+=dx/d*0.6*fps60;e.y+=dy/d*0.6*fps60;
                break;
            case 1:
                if(e.cd<=0){e.vx=dx/d*12;e.vy=dy/d*12;e.cd=e.cdMax;spawnParticles(e.x,e.y,6,'#fa5',5,25);sfxEnemyDash();}
                e.x+=e.vx*fps60;e.y+=e.vy*fps60;e.vx*=Math.pow(0.96,fps60);e.vy*=Math.pow(0.96,fps60);break;
            case 2:
                if(e.cd<=0){
                    bullets.push({x:e.x,y:e.y,vx:dx/d*4,vy:dy/d*4,life:120});
                    e.cd=e.cdMax;
                    spawnParticles(e.x,e.y,4,'#ff5',3,20);
                    sfxBulletFire();
                }break;
                case 3:
    if(!e.initialized){
        e.initialized = true;

        const side = Math.floor(Math.random()*4);
        const offset = fieldSize + 40;

        if(side===0){ // 左
            e.x = -offset;
            e.y = rand(-fieldSize, fieldSize);
        }
        if(side===1){ // 右
            e.x = offset;
            e.y = rand(-fieldSize, fieldSize);
        }
        if(side===2){ // 上
            e.y = -offset;
            e.x = rand(-fieldSize, fieldSize);
        }
        if(side===3){ // 下
            e.y = offset;
            e.x = rand(-fieldSize, fieldSize);
        }

        const dx = -e.x;
        const dy = -e.y;
        const d = Math.hypot(dx,dy);
        e.vx = dx/d*3;
        e.vy = dy/d*3;
    }

    e.x += e.vx*fps60;
    e.y += e.vy*fps60;
break;
            case 4:
                e.vx+=dx/d*0.25*fps60;e.vy+=dy/d*0.25*fps60;
                e.vx*=Math.pow(0.94,fps60);e.vy*=Math.pow(0.94,fps60);
                e.x+=e.vx*fps60;e.y+=e.vy*fps60;
                // 時限爆発
                if(!e.gliderTimer) e.gliderTimer=480+Math.random()*240;
                e.gliderTimer-=fps60;
                if(e.gliderTimer<=0){
                    spawnShockwave(e.x,e.y,'rgba(255,60,100');
                    spawnParticles(e.x,e.y,20,'#f35',7,60);
                    explosions.push({x:e.x,y:e.y,r:0,max:55,life:35});
                    if(invincible<=0&&Math.hypot(player.x-e.x,player.y-e.y)<55)takeDamage();
                    e._dead=true;
                }
                break;
            case 5:
                if(e.cd<=40&&!e.preview){
                    e.preview={
                        x:rand(-fieldSize+20,fieldSize-20),
                        y:rand(-fieldSize+20,fieldSize-20)
                    };
                    sfxTeleportWarning();
                }
                if(e.cd<=0){
                    e.x=e.preview.x;e.y=e.preview.y;
                    explosions.push({x:e.x,y:e.y,r:0,max:40,life:30});
                    spawnShockwave(e.x,e.y,'rgba(255,120,80');
                    spawnParticles(e.x,e.y,18,'#f75',7,50);
                    sfxTeleportLand();
                    e.preview=null;e.cd=e.cdMax;
                }break;
            // ── SPREADER: 静止して5方向に扇状弾 ──
            case 6:
                if(e.cd<=0){
                    const baseAng=Math.atan2(dy,dx);
                    const spread=Math.PI*0.55; // 扇の広がり
                    const bCount=5;
                    for(let bi=0;bi<bCount;bi++){
                        const a=baseAng - spread/2 + spread*(bi/(bCount-1));
                        bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*2.2,vy:Math.sin(a)*2.2,life:200,color:'#f0a'});
                    }
                    e.cd=e.cdMax;
                    spawnParticles(e.x,e.y,6,'#f0a',3,22);
                    sfxBulletFire();
                }break;
            // ── SPLITTER: 一定時間後に自動分裂（大型1→中型4→小型16） ──
            case 7:{
                // 大型: ゆっくり追尾（M の半分: max 1.25）
                e.x+=dx/d*0.3*fps60; e.y+=dy/d*0.3*fps60;
                {const spdL=Math.hypot(e.vx||0,e.vy||0);
                if(spdL>1.25){e.vx=(e.vx||0)/spdL*1.25;e.vy=(e.vy||0)/spdL*1.25;}}
                if(!e.splitTimer) e.splitTimer=360+Math.random()*120;
                e.splitTimer-=fps60;
                if(e.splitTimer<=0){
                    for(let si=0;si<4;si++){
                        const sa=si*Math.PI/2+Math.random()*0.3;
                        const spd=3.5+Math.random()*1.5;
                        enemies.push({type:'7m',x:e.x,y:e.y,
                            vx:Math.cos(sa)*spd,vy:Math.sin(sa)*spd,
                            cd:0,cdMax:0,preview:null,spawnFlash:0,
                            splitTimer:200+Math.random()*80});
                    }
                    spawnShockwave(e.x,e.y,'rgba(255,80,160');
                    spawnParticles(e.x,e.y,18,'#f5a',7,50);
                    e._dead=true;
                }
                break;}
            case '7m':{
                // 中型: 控えめな追尾（S の半分: max 2.5）
                e.vx+=dx/d*0.4*fps60; e.vy+=dy/d*0.4*fps60;
                e.vx*=Math.pow(0.96,fps60); e.vy*=Math.pow(0.96,fps60);
                const spd7m=Math.hypot(e.vx,e.vy);
                if(spd7m>2.5){e.vx=e.vx/spd7m*2.5;e.vy=e.vy/spd7m*2.5;}
                e.x+=e.vx*fps60; e.y+=e.vy*fps60;
                if(!e.splitTimer) e.splitTimer=200+Math.random()*80;
                e.splitTimer-=fps60;
                if(e.splitTimer<=0){
                    for(let si=0;si<4;si++){
                        const sa=si*Math.PI/2+Math.random()*0.3;
                        const spd=4+Math.random()*2;
                        enemies.push({type:'7s',x:e.x,y:e.y,
                            vx:Math.cos(sa)*spd,vy:Math.sin(sa)*spd,
                            cd:0,cdMax:0,preview:null,spawnFlash:0});
                    }
                    spawnParticles(e.x,e.y,12,'#f7b',5,35);
                    e._dead=true;
                }
                break;}
            case '7s':{
                // 小型: 素早い追尾（最小だが最速: グライダー相当 max 5）
                e.vx+=dx/d*1.1*fps60; e.vy+=dy/d*1.1*fps60;
                e.vx*=Math.pow(0.94,fps60); e.vy*=Math.pow(0.94,fps60);
                const spd7s=Math.hypot(e.vx,e.vy);
                if(spd7s>5){e.vx=e.vx/spd7s*5;e.vy=e.vy/spd7s*5;}
                e.x+=e.vx*fps60; e.y+=e.vy*fps60;
                // 消滅タイマー
                if(!e.vanishTimer){e.vanishTimer=300+Math.random()*120;e.vanishMax=e.vanishTimer;}
                e.vanishTimer-=fps60;
                if(e.vanishTimer<=0){spawnParticles(e.x,e.y,6,'#ffaadd',3,25);e._dead=true;}
                break;}
            // ── MINELAYER: ダッシュ移動しながら距離ベースで地雷設置 ──
            case 8:{
                if(e.cd<=0){e.vx=dx/d*18;e.vy=dy/d*18;e.cd=e.cdMax;spawnParticles(e.x,e.y,5,'#f80',4,20);}
                e.x+=e.vx*fps60;e.y+=e.vy*fps60;
                e.vx*=Math.pow(0.96,fps60);e.vy*=Math.pow(0.96,fps60);
                // 距離ベース生成: 前回設置位置から一定距離移動したら設置
                if(!e.lastMineX){e.lastMineX=e.x;e.lastMineY=e.y;}
                const mineDist=Math.hypot(e.x-e.lastMineX,e.y-e.lastMineY);
                const MINE_SPACING=135; // 爆発半径45×3 = 爆弾2個＋隙間1個分
                if(mineDist>=MINE_SPACING){
                    mines.push({x:e.x,y:e.y,timer:240,maxTimer:240,armed:false,exploding:false,explodeR:0,maxR:45});
                    e.lastMineX=e.x; e.lastMineY=e.y;
                }
                break;}
            // ── BOMBER: 直線弾道爆弾投擲 ──
            case 9:{
                const desiredDist=120;
                if(d<desiredDist){e.x-=dx/d*0.4*fps60;e.y-=dy/d*0.4*fps60;}
                else{e.x+=dx/d*0.2*fps60;e.y+=dy/d*0.2*fps60;}
                if(e.cd<=0){
                    const tx=player.x+rand(-15,15), ty=player.y+rand(-15,15);
                    const ttime=90;
                    const bvx=(tx-e.x)/ttime, bvy=(ty-e.y)/ttime;
                    bombs.push({
                        x:e.x,y:e.y,
                        vx:bvx, vy:bvy,
                        grav:0, // 重力なし→直線
                        targetX:tx,targetY:ty,
                        life:ttime,maxLife:ttime,
                        exploded:false,explodeR:0,maxR:55
                    });
                    e.cd=e.cdMax;
                    sfxBulletFire();
                }
                break;}
            // ── WALL: 画面外から登場→中央横断 ──
            case 10:{
                if(!e.wallInit){
                    e.wallInit=true;
                    // 既存ウォールと同じaxisを避ける
                    const existAxes=enemies.filter(o=>o!==e&&o.type===10&&o.wallInit).map(o=>o.wallAxis);
                    e.wallAxis=(existAxes.includes('h')&&!existAxes.includes('v'))?'v':
                               (existAxes.includes('v')&&!existAxes.includes('h'))?'h':
                               (Math.random()<0.5?'h':'v');
                    e.wallGap=rand(-fieldSize*0.5,fieldSize*0.5);
                    e.wallGapSize=55;
                    const startOff=fieldSize+50;
                    e.wallPos=(Math.random()<0.5?-1:1)*(startOff);
                    e.wallSpeed=(e.wallPos<0?1:-1)*0.7;
                    e.x=e.wallAxis==='h'?0:e.wallPos;
                    e.y=e.wallAxis==='h'?e.wallPos:0;
                }
                // 壁をスライド
                e.wallPos+=e.wallSpeed*fps60;
                // 反対側の画面外まで到達したら消える
                if(Math.abs(e.wallPos)>fieldSize+60){ e._dead=true; break; }
                // 当たり判定
                {
                    const wallThick=8;
                    const px=player.x,py=player.y;
                    if(e.wallAxis==='h'){
                        const inGap=Math.abs(px-e.wallGap)<e.wallGapSize/2;
                        if(!inGap&&Math.abs(py-e.wallPos)<wallThick){
                            if(invincible<=0&&e.spawnFlash<=0)takeDamage();
                        }
                    } else {
                        const inGap=Math.abs(py-e.wallGap)<e.wallGapSize/2;
                        if(!inGap&&Math.abs(px-e.wallPos)<wallThick){
                            if(invincible<=0&&e.spawnFlash<=0)takeDamage();
                        }
                    }
                }
                e.x=e.wallAxis==='h'?0:e.wallPos;
                e.y=e.wallAxis==='h'?e.wallPos:0;
                break;}
            // ── VORTEX: 螺旋弾 ──
            case 11:{
                // フィールド中央付近に出現・ゆっくり回転しながら螺旋弾を放出
                // プレイヤーを避けた中央付近へ漂う
                const distToCenter=Math.hypot(e.x,e.y);
                if(distToCenter>80){
                    e.x-=e.x/distToCenter*0.3*fps60;
                    e.y-=e.y/distToCenter*0.3*fps60;
                }
                if(!e.vortexAngle)e.vortexAngle=Math.random()*Math.PI*2;
                e.vortexAngle+=0.04*fps60;
                if(e.cd<=0){
                    // 3本の螺旋アーム
                    for(let arm=0;arm<3;arm++){
                        const ba=e.vortexAngle+arm*Math.PI*2/3;
                        vortexBullets.push({
                            x:e.x,y:e.y,
                            vx:Math.cos(ba)*2.5,vy:Math.sin(ba)*2.5,
                            life:220,color:'#c8f'
                        });
                    }
                    e.cd=e.cdMax;
                }
                break;}
            // ── LASER: 照準→一瞬貫通レーザー ──
            case 12:{
                // 本体はゆっくり徘徊
                e.x+=dx/d*0.25*fps60;e.y+=dy/d*0.25*fps60;
                if(e.cd<=0){
                    const laserAng=Math.atan2(dy,dx);
                    laserBeams.push({
                        ox:e.x,oy:e.y,
                        angle:laserAng,
                        warmup:35,
                        active:0,
                        life:35+8,
                        color:'#f4c'
                    });
                    e.cd=e.cdMax;
                    sfxLaserCharge(); // 予告チャージ音
                }
                break;}
        }
        // ── 反発はループ後の専用パスで処理（このループ内では無効） ──
        if(false){}// placeholder
        // 当たり半径: type別
        const hitR = (e.type==='7m')?9 : (e.type==='7s')?6 : 12;
        if(d<hitR&&invincible<=0&&e.spawnFlash<=0)takeDamage();
    });
    enemies=enemies.filter(e=>!e._dead);

    // ── 敵同士の分離パス（速度依存、絶対重なり解消、ウォールはスルー） ──
    {
        const live=enemies.filter(e=>e.type!==10&&!e._dead);
        // 複数回反復：多体接触でも収束させる
        for(let iter=0;iter<4;iter++){
            for(let i=0;i<live.length;i++){
                const e=live[i];
                const rE=(e.type===7)?15:(e.type==='7m')?10:(e.type==='7s')?6:12;
                const eSpdSq=(e.vx||0)**2+(e.vy||0)**2;
                for(let j=i+1;j<live.length;j++){
                    const o=live[j];
                    const rO=(o.type===7)?15:(o.type==='7m')?10:(o.type==='7s')?6:12;
                    const minDist=rE+rO;
                    const rx=e.x-o.x, ry=e.y-o.y;
                    const rd=Math.hypot(rx,ry)+0.0001;
                    if(rd>=minDist)continue;
                    const overlap=minDist-rd;
                    const oSpdSq=(o.vx||0)**2+(o.vy||0)**2;
                    const total=eSpdSq+oSpdSq+0.0001;
                    // 遅い方が多く退く：ratioE = oの速度比（oが速いほどeが多く退く）
                    // pushE + pushO = overlap（ちょうど解消、オーバーシュートなし）
                    const ratioE=oSpdSq/total; // 0〜1
                    // 最低10%は均等に退く（完全静止同士でも分離）
                    const shareE=ratioE*0.90+0.10;
                    const shareO=(1-ratioE)*0.90+0.10;
                    const norm=shareE+shareO; // ≈1.0（正規化）
                    e.x+=rx/rd*(overlap*shareE/norm);
                    e.y+=ry/rd*(overlap*shareE/norm);
                    o.x-=rx/rd*(overlap*shareO/norm);
                    o.y-=ry/rd*(overlap*shareO/norm);
                }
            }
        }
    }

    // ── 弾丸 ──
    bullets.forEach(b=>{
        b.x+=b.vx*fps60;b.y+=b.vy*fps60;b.life-=fps60;
        if(invincible<=0&&Math.hypot(b.x-player.x,b.y-player.y)<9){
            b.life=-1;
            spawnParticles(b.x,b.y,10,'#ff5',5,35);
            sfxBulletHit();
            takeDamage();
        }
    });
    bullets=bullets.filter(b=>{
        if(b.life<=0)return false;
        // スプレッダー弾は画面外まで生存、通常弾はfieldSize内のみ
        const bound=b.color?fieldSize*2.5:fieldSize;
        return Math.abs(b.x)<bound&&Math.abs(b.y)<bound;
    });

    // ── 地雷 ──
    mines.forEach(m=>{
        if(m.exploding){
            m.explodeR+=3*fps60;
            if(m.explodeR>m.maxR){
                m._dead=true;
                return;
            }
            // 爆発ダメージ判定
            if(invincible<=0&&Math.hypot(m.x-player.x,m.y-player.y)<m.explodeR+6){
                takeDamage();
            }
            return;
        }
        m.timer-=fps60;
        if(m.timer<=0){
            m.exploding=true;
            spawnParticles(m.x,m.y,16,'#f80',6,50);
            spawnShockwave(m.x,m.y,'rgba(255,140,0');
            sfxBulletHit();
        }
    });
    mines=mines.filter(m=>!m._dead);

    // ── 爆弾（ボマー）──
    bombs.forEach(b=>{
        if(b.exploded){
            b.explodeR+=4*fps60;
            if(b.explodeR>b.maxR){b._dead=true;return;}
            if(invincible<=0&&Math.hypot(b.targetX-player.x,b.targetY-player.y)<b.explodeR+6)takeDamage();
            return;
        }
        // 直線 or 放物線
        b.x+=b.vx*fps60;
        if(b.grav>0) b.vy+=b.grav*fps60;
        b.y+=b.vy*fps60;
        b.life-=fps60;
        if(b.life<=0){
            b.exploded=true;
            spawnParticles(b.targetX,b.targetY,22,'#f90',8,65);
            spawnShockwave(b.targetX,b.targetY,'rgba(255,150,0');
            explosions.push({x:b.targetX,y:b.targetY,r:0,max:55,life:35});
            sfxBulletHit();
        }
    });
    bombs=bombs.filter(b=>!b._dead);

    // ── ボルテックス螺旋弾 ──
    vortexBullets.forEach(b=>{
        b.x+=b.vx*fps60; b.y+=b.vy*fps60; b.life-=fps60;
        if(invincible<=0&&Math.hypot(b.x-player.x,b.y-player.y)<8){
            b.life=-1;
            spawnParticles(b.x,b.y,6,'#c8f',3,25);
            takeDamage();
        }
    });
    vortexBullets=vortexBullets.filter(b=>b.life>0&&Math.abs(b.x)<fieldSize*1.2&&Math.abs(b.y)<fieldSize*1.2);

    // ── レーザービーム ──
    laserBeams.forEach(lb=>{
        lb.life-=fps60;
        if(lb.warmup>0){lb.warmup-=fps60;return;}
        if(lb.active<=0){
            lb.active=8;
            sfxLaserFire(); // 発射時SE
        }
        lb.active-=fps60;
        // 当たり判定: レーザー線とプレイヤーの距離
        if(lb.active>0&&invincible<=0){
            // 直線: ox,oy から angle方向に無限
            const cos=Math.cos(lb.angle),sin=Math.sin(lb.angle);
            const ex2=lb.ox,ey2=lb.oy;
            // プレイヤーへの垂直距離
            const tx2=player.x-ex2,ty2=player.y-ey2;
            const proj=tx2*cos+ty2*sin;
            if(proj>0){
                const perp=Math.abs(tx2*sin-ty2*cos);
                if(perp<9)takeDamage();
            }
        }
    });
    laserBeams=laserBeams.filter(lb=>lb.life>0);

    explosions.forEach(ex=>{ex.r+=2*fps60;ex.life-=fps60;});
    explosions=explosions.filter(ex=>ex.life>0);

    particles.forEach(p=>{
        p.x+=p.vx*fps60;p.y+=p.vy*fps60;
        p.vx*=Math.pow(0.92,fps60);p.vy*=Math.pow(0.92,fps60);
        p.life-=fps60;
    });
    particles=particles.filter(p=>p.life>0);

    shockwaves.forEach(sw=>{sw.r+=sw.maxR/sw.maxLife*fps60*1.4;sw.life-=fps60;});
    shockwaves=shockwaves.filter(sw=>sw.life>0);

    trails.forEach(t=>t.life-=fps60);
    trails=trails.filter(t=>t.life>0);

    // フィールド外に出た敵を削除（境界FIELD_BASE固定）
    enemies=enemies.filter(e=>Math.abs(e.x)<fieldSize*1.5&&Math.abs(e.y)<fieldSize*1.5);

    invincible-=fps60;slowMotion-=fps60;flash-=fps60;
    if(hitShake>0)hitShake-=fps60;
    if(running)updateScreenshotBuffer();
}

/* ===== DRAW ===== */

// キャラ別プレイヤー描画
function drawPlayer(ctx2, px, py, charType, invincible, hits, tickCount){
    const blinkOn = invincible<=0||Math.floor(invincible/8)%2===0;
    if(!blinkOn) return;

    // 共通: グロウオーラ
    ctx2.globalAlpha=0.12+Math.sin(tickCount*0.1)*0.06;
    ctx2.fillStyle= charType===0?'#0ff': charType===1?'#28f':'#06d';
    ctx2.shadowColor=ctx2.fillStyle; ctx2.shadowBlur=22;
    ctx2.beginPath(); ctx2.arc(px,py,17,0,Math.PI*2); ctx2.fill();
    ctx2.shadowBlur=0; ctx2.globalAlpha=1;

    const color = charType===0?'#4df': charType===1?'#5af':'#08f';
    ctx2.strokeStyle=color;
    ctx2.lineWidth=1.8;
    ctx2.shadowColor=color;
    ctx2.shadowBlur=hits>=2?22:12;

    if(charType===0){
        // 八方向クロス（星型）
        ctx2.beginPath();
        for(let i=0;i<8;i++){
            const a=i/8*Math.PI*2;
            const r=i%2===0?11:5;
            i===0?ctx2.moveTo(px+Math.cos(a)*r,py+Math.sin(a)*r)
                 :ctx2.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r);
        }
        ctx2.closePath(); ctx2.stroke();
        // センタードット
        ctx2.fillStyle='#aff'; ctx2.shadowBlur=6;
        ctx2.beginPath(); ctx2.arc(px,py,2.5,0,Math.PI*2); ctx2.fill();
    } else if(charType===1){
        // 矢印（chevron）右向き、移動方向に向く
        const ang=player.angle;
        ctx2.save();
        ctx2.translate(px,py);
        ctx2.rotate(ang);
        ctx2.beginPath();
        ctx2.moveTo(-10,-9);
        ctx2.lineTo(7,0);
        ctx2.lineTo(-10,9);
        ctx2.lineTo(-5,0);
        ctx2.closePath();
        ctx2.stroke();
        ctx2.restore();
        ctx2.fillStyle='#8cf'; ctx2.shadowBlur=6;
        ctx2.beginPath(); ctx2.arc(px,py,2,0,Math.PI*2); ctx2.fill();
    } else{
        // 六角形
        ctx2.beginPath();
        for(let i=0;i<6;i++){
            const a=i/6*Math.PI*2-Math.PI/6;
            const r=11;
            i===0?ctx2.moveTo(px+Math.cos(a)*r,py+Math.sin(a)*r)
                 :ctx2.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r);
        }
        ctx2.closePath(); ctx2.stroke();
        // 中央の小さい六角形
        ctx2.lineWidth=0.8; ctx2.globalAlpha=0.6;
        ctx2.beginPath();
        for(let i=0;i<6;i++){
            const a=i/6*Math.PI*2-Math.PI/6;
            i===0?ctx2.moveTo(px+Math.cos(a)*4,py+Math.sin(a)*4)
                 :ctx2.lineTo(px+Math.cos(a)*4,py+Math.sin(a)*4);
        }
        ctx2.closePath(); ctx2.stroke();
        ctx2.globalAlpha=1; ctx2.lineWidth=1.8;
        ctx2.fillStyle='#6af'; ctx2.shadowBlur=6;
        ctx2.beginPath(); ctx2.arc(px,py,2,0,Math.PI*2); ctx2.fill();
    }
    ctx2.shadowBlur=0;
}

function drawPlayerScreen(px, py, scale){
    // スクリーン座標でプレイヤーを描画
    const blinkOn = invincible<=0||Math.floor(invincible/8)%2===0;
    if(!blinkOn) return;
    const r11=11*scale, r5=5*scale, r17=17*scale, r2=2.5*scale;

    // ── ORBITER: 中心点 + 周回衛星 ──
    if(charType===3){
        const cx2 = w2sx_ref(orbiterCenterX), cy2 = w2sy_ref(orbiterCenterY);

        // 中心点のオーラ
        ctx.globalAlpha=0.08+Math.sin(tickCount*0.1)*0.04;
        ctx.fillStyle='#c0f'; ctx.shadowColor='#c0f'; ctx.shadowBlur=18;
        ctx.beginPath(); ctx.arc(cx2,cy2,r17,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1;

        // 軌道リング
        ctx.strokeStyle='rgba(180,0,255,0.25)'; ctx.lineWidth=0.8;
        ctx.setLineDash([3*scale,4*scale]);
        ctx.beginPath(); ctx.arc(cx2,cy2,ORBIT_RADIUS*scale,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);

        // 中心点（小さいリング）
        ctx.strokeStyle='#b0e'; ctx.lineWidth=1.2;
        ctx.shadowColor='#c0f'; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(cx2,cy2,4*scale,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='#e8f'; ctx.shadowBlur=4;
        ctx.beginPath(); ctx.arc(cx2,cy2,1.5*scale,0,Math.PI*2); ctx.fill();

        // 衛星本体（player.x/yがここ）
        ctx.shadowColor='#c0f'; ctx.shadowBlur=hits>=2?22:14;
        ctx.strokeStyle='#d08fff'; ctx.lineWidth=1.8;
        ctx.beginPath(); ctx.arc(px,py,r11,0,Math.PI*2); ctx.stroke();
        // 衛星内側の小リング
        ctx.globalAlpha=0.6; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.arc(px,py,r5,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;
        ctx.fillStyle='#c4f'; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(px,py,2*scale,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        return;
    }

    // ── WARPER: ダイヤモンド + CDインジケータ ──
    if(charType===4){
        ctx.globalAlpha=0.1+Math.sin(tickCount*0.12)*0.05;
        ctx.fillStyle='#fa0'; ctx.shadowColor='#fa0'; ctx.shadowBlur=20;
        ctx.beginPath(); ctx.arc(px,py,r17,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1;

        const cdReady=(warperCD<=0);
        const color=cdReady?'#ffb300':'#886600';
        ctx.strokeStyle=color; ctx.lineWidth=1.8;
        ctx.shadowColor=color; ctx.shadowBlur=hits>=2?22:12;

        // ダイヤモンド外形
        ctx.beginPath();
        ctx.moveTo(px,         py-r11);
        ctx.lineTo(px+r11*0.8, py);
        ctx.lineTo(px,         py+r11);
        ctx.lineTo(px-r11*0.8, py);
        ctx.closePath(); ctx.stroke();

        // 内ダイヤモンド
        ctx.globalAlpha=0.5; ctx.lineWidth=0.8;
        ctx.beginPath();
        ctx.moveTo(px,        py-r5);
        ctx.lineTo(px+r5*0.8, py);
        ctx.lineTo(px,        py+r5);
        ctx.lineTo(px-r5*0.8, py);
        ctx.closePath(); ctx.stroke();
        ctx.globalAlpha=1; ctx.lineWidth=1.8;

        // CDインジケータ（円グラフ）
        const cdRate=Math.max(0,warperCD/WARPER_CD_MAX);
        const arcR=r11*0.55;
        if(cdRate>0){
            // 背景弧（グレー）
            ctx.strokeStyle='rgba(255,180,0,0.2)'; ctx.lineWidth=1.5*scale;
            ctx.beginPath(); ctx.arc(px,py,arcR,0,Math.PI*2); ctx.stroke();
            // CDアーク（残り時間）
            ctx.strokeStyle='#fc0'; ctx.lineWidth=1.5*scale;
            ctx.shadowColor='#fc0'; ctx.shadowBlur=6;
            ctx.beginPath();
            ctx.arc(px,py,arcR,-Math.PI/2,-Math.PI/2+cdRate*Math.PI*2);
            ctx.stroke();
        }

        ctx.fillStyle=cdReady?'#ffe':'#aa7700';
        ctx.shadowBlur=cdReady?8:2;
        ctx.beginPath(); ctx.arc(px,py,2*scale,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        return;
    }

    // ── 既存キャラ (0/1/2) ──
    ctx.globalAlpha=0.12+Math.sin(tickCount*0.1)*0.06;
    ctx.fillStyle= charType===0?'#0ff': charType===1?'#28f':'#06d';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=22;
    ctx.beginPath(); ctx.arc(px,py,r17,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    const color = charType===0?'#4df': charType===1?'#5af':'#08f';
    ctx.strokeStyle=color; ctx.lineWidth=1.8;
    ctx.shadowColor=color; ctx.shadowBlur=hits>=2?22:12;

    if(charType===0){
        ctx.beginPath();
        for(let i=0;i<8;i++){
            const a=i/8*Math.PI*2, r=i%2===0?r11:r5;
            i===0?ctx.moveTo(px+Math.cos(a)*r,py+Math.sin(a)*r)
                 :ctx.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r);
        }
        ctx.closePath(); ctx.stroke();
        ctx.fillStyle='#aff'; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(px,py,r2,0,Math.PI*2); ctx.fill();
    } else if(charType===1){
        const ang=player.angle;
        ctx.save(); ctx.translate(px,py); ctx.rotate(ang);
        ctx.beginPath();
        ctx.moveTo(-r11,-9*scale); ctx.lineTo(7*scale,0);
        ctx.lineTo(-r11,9*scale); ctx.lineTo(-r5,0);
        ctx.closePath(); ctx.stroke();
        ctx.restore();
        ctx.fillStyle='#8cf'; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(px,py,2*scale,0,Math.PI*2); ctx.fill();
    } else {
        ctx.beginPath();
        for(let i=0;i<6;i++){
            const a=i/6*Math.PI*2-Math.PI/6;
            i===0?ctx.moveTo(px+Math.cos(a)*r11,py+Math.sin(a)*r11)
                 :ctx.lineTo(px+Math.cos(a)*r11,py+Math.sin(a)*r11);
        }
        ctx.closePath(); ctx.stroke();
        ctx.lineWidth=0.8; ctx.globalAlpha=0.6;
        ctx.beginPath();
        for(let i=0;i<6;i++){
            const a=i/6*Math.PI*2-Math.PI/6, r=4*scale;
            i===0?ctx.moveTo(px+Math.cos(a)*r,py+Math.sin(a)*r)
                 :ctx.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r);
        }
        ctx.closePath(); ctx.stroke();
        ctx.globalAlpha=1; ctx.lineWidth=1.8;
        ctx.fillStyle='#6af'; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(px,py,2*scale,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;
}

function draw(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    if(!running&&!deathSequence)return;

    // =========================================================
    // 座標変換の設計（ctx.scaleは一切使わない）
    // ---------------------------------------------------------
    // FSH = 枠の半辺(px) = 完全固定定数
    // scale = FSH / fieldSize  ← fieldSize増加→scaleが下がる
    // w2sx(wx) = ocx + (wx + camTx) * scale
    // w2sy(wy) = ocy + (wy + camTy) * scale
    // 枠のスクリーンサイズ = fieldSize * scale = FSH (常に不変！)
    // =========================================================
    const FSH = Math.min(W,H) * 0.45;
    const ocx = W/2, ocy = H/2;

    const shakeScale = deathSequence ? Math.max(0,1-deathTimer/60) : 1;
    const shx = hitShake>0 ? (Math.random()-0.5)*hitShake*0.8*shakeScale : 0;
    const shy = hitShake>0 ? (Math.random()-0.5)*hitShake*0.8*shakeScale : 0;
    const ccx = ocx+shx, ccy = ocy+shy;

    let camTx=0, camTy=0, deathExtraScale=1;
    if(deathSequence){
        const zp=Math.min(deathTimer/80,1);
        const eased=1-Math.pow(1-zp,2.5);
        camTx=-deathPlayerX*eased;
        camTy=-deathPlayerY*eased;
        deathExtraScale=1+eased*0.4;
    }

    const scale = (FSH / fieldSize) * deathExtraScale;
    const w2sx = wx => ccx + (wx + camTx) * scale;
    const w2sy = wy => ccy + (wy + camTy) * scale;
    const w2r  = r  => Math.abs(r * scale);
    // drawPlayerScreen から参照できるよう module スコープ変数に保存
    w2sx_ref = w2sx; w2sy_ref = w2sy;

    // ── 背景 ──
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

    // ── Flash ──
    if(flash>0){
        const maxF=deathSequence?60:24;
        ctx.fillStyle=`rgba(255,50,50,${Math.max(0,(flash/maxF)*0.4)})`;
        ctx.fillRect(0,0,W,H);
    }

    // ── HUD HP数字 ──
    ctx.globalAlpha=0.13; ctx.fillStyle='#0af';
    ctx.font=`bold ${Math.min(W,H)*0.5}px Orbitron,monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(3-hits, W/2, H/2);
    ctx.globalAlpha=1;

    // ── 枠（スクリーン座標で完全固定）──
    const fL=ocx-FSH, fR=ocx+FSH, fT=ocy-FSH, fB=ocy+FSH;

    // Clip: 枠内のみ
    ctx.save();
    ctx.beginPath(); ctx.rect(fL,fT,FSH*2,FSH*2); ctx.clip();

    
    // ── 星 ──
    bgStars.forEach(s=>{
        ctx.globalAlpha=(0.25+s.a*0.35)*(deathSequence?0.4:1);
        ctx.fillStyle='#4af';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;

    // Grid
    ctx.strokeStyle='rgba(0,150,255,0.06)'; ctx.lineWidth=1;
    const gRange=Math.ceil(fieldSize/60+1)*60;
    for(let gx=-gRange;gx<=gRange;gx+=60){
        const sx2=w2sx(gx); if(sx2<fL-1||sx2>fR+1)continue;
        ctx.beginPath(); ctx.moveTo(sx2,fT); ctx.lineTo(sx2,fB); ctx.stroke();
    }
    for(let gy=-gRange;gy<=gRange;gy+=60){
        const sy2=w2sy(gy); if(sy2<fT-1||sy2>fB+1)continue;
        ctx.beginPath(); ctx.moveTo(fL,sy2); ctx.lineTo(fR,sy2); ctx.stroke();
    }

    // Shockwaves
    shockwaves.forEach(sw=>{
        const t=1-sw.life/sw.maxLife;
        ctx.globalAlpha=(1-t)*0.65;
        ctx.strokeStyle=sw.color+',1)'; ctx.lineWidth=2;
        ctx.shadowColor=sw.color+',1)'; ctx.shadowBlur=14;
        ctx.beginPath(); ctx.arc(w2sx(sw.x),w2sy(sw.y),w2r(sw.r),0,Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0;
    });
    ctx.globalAlpha=1;

    // Player trail
    trails.forEach(t=>{
        const a=t.life/t.maxLife;
        const tc=charType===0?'#0af':charType===1?'#28f':'#06d';
        ctx.globalAlpha=a*0.4; ctx.strokeStyle=tc; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(w2sx(t.x),w2sy(t.y),w2r(4*a),0,Math.PI*2); ctx.stroke();
    });
    ctx.globalAlpha=1;

    // Player
    drawPlayerScreen(w2sx(player.x), w2sy(player.y), scale);

    // Enemies
    if(!deathSequence){
        const eColors={
            0:'#ff4444',1:'#ff8800',2:'#ffe000',3:'#ff6600',4:'#ff2266',5:'#ff9944',
            6:'#ff00cc',7:'#ff44aa','7m':'#ff66bb','7s':'#ffaadd',
            8:'#ff7700',9:'#ffcc00',10:'#ff3344',11:'#cc44ff',12:'#ff22aa'
        };
        enemies.forEach(e=>{
            if(e.type===10)return; // ウォールは別途描画
            const color=eColors[e.type]||'#ff4444';
            const ex=w2sx(e.x), ey=w2sy(e.y);
            const spawning=e.spawnFlash>0;
            // 無敵中はプレイヤーと同じ点滅パターン（8フレーム周期ON/OFF）
            const invAlpha=invincible>0?0.30:1.0; // 点滅せず一定の薄さ
            const baseAlpha=(spawning?Math.min(0.4,e.spawnFlash/90*0.4):1.0)*invAlpha;
            ctx.globalAlpha=baseAlpha;
            ctx.shadowColor=color;
            ctx.shadowBlur=(spawning?4:10)+Math.sin(tickCount*0.15)*3;

            // スポーン時の出現リング
            if(spawning){
                ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;
                ctx.beginPath();ctx.arc(ex,ey,w2r(22),0,Math.PI*2);ctx.stroke();
                ctx.globalAlpha=baseAlpha;
            }

            // タイプ別サイズ
            const baseR=e.type===7?w2r(15):e.type==='7m'?w2r(10):e.type==='7s'?w2r(6):w2r(8);

            // ── 本体円 ──
            ctx.strokeStyle=color;ctx.lineWidth=1.5;
            ctx.beginPath();ctx.arc(ex,ey,baseR,0,Math.PI*2);ctx.stroke();

            // ── タイプ別外付け装飾（円の外側に突出） ──
            ctx.globalAlpha=baseAlpha*0.85;
            switch(e.type){
                case 0: // CHASER: 丸のみ
                    break;
                case 1:{ // DASHER: 進行方向に三角矢印が突出
                    const ang=Math.atan2(player.y-e.y,player.x-e.x);
                    const tip=baseR*1.9, hw=baseR*0.55;
                    ctx.lineWidth=1.5; ctx.strokeStyle=color;
                    ctx.beginPath();
                    ctx.moveTo(ex+Math.cos(ang)*tip, ey+Math.sin(ang)*tip);
                    ctx.lineTo(ex+Math.cos(ang)*baseR+Math.cos(ang+Math.PI/2)*hw,
                               ey+Math.sin(ang)*baseR+Math.sin(ang+Math.PI/2)*hw);
                    ctx.lineTo(ex+Math.cos(ang)*baseR+Math.cos(ang-Math.PI/2)*hw,
                               ey+Math.sin(ang)*baseR+Math.sin(ang-Math.PI/2)*hw);
                    ctx.closePath(); ctx.stroke();
                    break;}
                case 2:{ // GUNNER: 砲身1本が外側に突出
                    const ang=Math.atan2(player.y-e.y,player.x-e.x);
                    const barLen=baseR*1.0, barW=baseR*0.35;
                    ctx.lineWidth=barW*2; ctx.strokeStyle=color; ctx.lineCap='round';
                    ctx.beginPath();
                    ctx.moveTo(ex+Math.cos(ang)*baseR, ey+Math.sin(ang)*baseR);
                    ctx.lineTo(ex+Math.cos(ang)*(baseR+barLen), ey+Math.sin(ang)*(baseR+barLen));
                    ctx.stroke(); ctx.lineCap='butt';
                    break;}
                case 3:{ // RUSHER: 外側に速度線（左右に2本）
                    const ang=Math.atan2(e.vy||0,e.vx||1);
                    const perp=ang+Math.PI/2;
                    ctx.lineWidth=1.2; ctx.strokeStyle=color;
                    [-baseR*0.45, baseR*0.45].forEach(offset=>{
                        const bx=ex+Math.cos(perp)*offset, by=ey+Math.sin(perp)*offset;
                        ctx.beginPath();
                        ctx.moveTo(bx+Math.cos(ang+Math.PI)*baseR*0.7, by+Math.sin(ang+Math.PI)*baseR*0.7);
                        ctx.lineTo(bx+Math.cos(ang)*(baseR+baseR*0.9), by+Math.sin(ang)*(baseR+baseR*0.9));
                        ctx.stroke();
                    });
                    break;}
                case 4:{ // GLIDER: 外側パルスリング（時限爆発の予兆）
                    const ratio=e.gliderTimer?(e.gliderTimer/(480+240)):1;
                    const pulse=0.3+0.7*Math.abs(Math.sin(tickCount*0.1*(2-ratio)));
                    ctx.lineWidth=1; ctx.strokeStyle=color; ctx.globalAlpha=baseAlpha*pulse;
                    ctx.beginPath();ctx.arc(ex,ey,baseR*1.45,0,Math.PI*2);ctx.stroke();
                    ctx.globalAlpha=baseAlpha*pulse*0.5;
                    ctx.beginPath();ctx.arc(ex,ey,baseR*1.85,0,Math.PI*2);ctx.stroke();
                    if(e.gliderTimer&&e.gliderTimer<120){
                        ctx.globalAlpha=baseAlpha*(1-e.gliderTimer/120)*0.8;
                        ctx.strokeStyle='#ff0000'; ctx.lineWidth=1.5;
                        ctx.beginPath();ctx.arc(ex,ey,baseR*2.2,0,Math.PI*2);ctx.stroke();
                    }
                    break;}
                case 5:{ // WARPER: 外側に点線リング
                    ctx.setLineDash([3,4]); ctx.lineWidth=1; ctx.strokeStyle=color;
                    ctx.globalAlpha=baseAlpha*(0.4+0.4*Math.abs(Math.sin(tickCount*0.08)));
                    ctx.beginPath();ctx.arc(ex,ey,baseR*1.7,0,Math.PI*2);ctx.stroke();
                    ctx.setLineDash([]);
                    break;}
                case 6:{ // SPREADER: 5本の放射線が外側に突出
                    ctx.lineWidth=1.2; ctx.strokeStyle=color;
                    const spread=Math.PI*0.55, bAng=Math.atan2(player.y-e.y,player.x-e.x);
                    for(let i=0;i<5;i++){
                        const a=bAng-spread/2+spread*(i/4);
                        ctx.beginPath();
                        ctx.moveTo(ex+Math.cos(a)*baseR, ey+Math.sin(a)*baseR);
                        ctx.lineTo(ex+Math.cos(a)*(baseR*1.8), ey+Math.sin(a)*(baseR*1.8));
                        ctx.stroke();
                    }
                    break;}
                case 7:{ // SPLITTER大: 縦横の分割線2本（円の端から端）
                    ctx.lineWidth=1.2; ctx.strokeStyle=color;
                    [0, Math.PI/2].forEach(a=>{
                        ctx.beginPath();
                        ctx.moveTo(ex+Math.cos(a)*baseR, ey+Math.sin(a)*baseR);
                        ctx.lineTo(ex+Math.cos(a+Math.PI)*baseR, ey+Math.sin(a+Math.PI)*baseR);
                        ctx.stroke();
                    });
                    break;}
                case '7m':{ // SPLITTER中: 斜め分割線2本
                    ctx.lineWidth=1; ctx.strokeStyle=color;
                    [Math.PI/4, -Math.PI/4].forEach(a=>{
                        ctx.beginPath();
                        ctx.moveTo(ex+Math.cos(a)*baseR, ey+Math.sin(a)*baseR);
                        ctx.lineTo(ex+Math.cos(a+Math.PI)*baseR, ey+Math.sin(a+Math.PI)*baseR);
                        ctx.stroke();
                    });
                    break;}
                case '7s':{ // SPLITTER小: 外側に4本棘（短い）
                    ctx.lineWidth=1; ctx.strokeStyle=color;
                    for(let i=0;i<4;i++){
                        const a=i*Math.PI/2+tickCount*0.06;
                        ctx.beginPath();
                        ctx.moveTo(ex+Math.cos(a)*baseR, ey+Math.sin(a)*baseR);
                        ctx.lineTo(ex+Math.cos(a)*(baseR*1.7), ey+Math.sin(a)*(baseR*1.7));
                        ctx.stroke();
                    }
                    break;}
                case 8:{ // MINELAYER: 外側に菱形（1個）
                    const ang=Math.atan2(player.y-e.y,player.x-e.x);
                    const cx2=ex+Math.cos(ang)*(baseR+w2r(9)), cy2=ey+Math.sin(ang)*(baseR+w2r(9));
                    const dr=w2r(6);
                    ctx.lineWidth=1.2; ctx.strokeStyle=color;
                    ctx.beginPath();
                    ctx.moveTo(cx2,cy2-dr); ctx.lineTo(cx2+dr*0.7,cy2);
                    ctx.lineTo(cx2,cy2+dr); ctx.lineTo(cx2-dr*0.7,cy2);
                    ctx.closePath(); ctx.stroke();
                    break;}
                case 9:{ // BOMBER: 上に導火線＋火花
                    ctx.lineWidth=1.5; ctx.strokeStyle=color; ctx.globalAlpha=baseAlpha*0.85;
                    ctx.beginPath();
                    ctx.moveTo(ex,ey-baseR);
                    ctx.quadraticCurveTo(ex+baseR*0.7,ey-baseR*1.6,ex+baseR*0.5,ey-baseR*2.2);
                    ctx.stroke();
                    const spark=Math.abs(Math.sin(tickCount*0.28));
                    ctx.globalAlpha=baseAlpha*spark; ctx.fillStyle=color;
                    ctx.beginPath();ctx.arc(ex+baseR*0.5,ey-baseR*2.2,w2r(2.2),0,Math.PI*2);ctx.fill();
                    break;}
                case 11:{ // VORTEX: 外側3本の弧状アーム
                    ctx.lineWidth=1.2; ctx.strokeStyle=color;
                    for(let i=0;i<3;i++){
                        const a=(e.vortexAngle||0)+i*Math.PI*2/3;
                        const ox2=ex+Math.cos(a)*baseR, oy2=ey+Math.sin(a)*baseR;
                        ctx.beginPath();
                        ctx.moveTo(ox2, oy2);
                        ctx.lineTo(ex+Math.cos(a)*(baseR+w2r(9)), ey+Math.sin(a)*(baseR+w2r(9)));
                        ctx.stroke();
                        ctx.globalAlpha=baseAlpha*0.45;
                        ctx.beginPath();ctx.arc(ex+Math.cos(a)*(baseR+w2r(11)),ey+Math.sin(a)*(baseR+w2r(11)),w2r(2.5),0,Math.PI*2);ctx.stroke();
                        ctx.globalAlpha=baseAlpha*0.85;
                    }
                    break;}
                case 12:{ // LASER: 外側に照準ライン1本＋小さな十字線
                    const ang=Math.atan2(player.y-e.y,player.x-e.x);
                    ctx.lineWidth=1.2; ctx.strokeStyle=color;
                    ctx.beginPath();
                    ctx.moveTo(ex+Math.cos(ang)*baseR, ey+Math.sin(ang)*baseR);
                    ctx.lineTo(ex+Math.cos(ang)*(baseR+w2r(14)), ey+Math.sin(ang)*(baseR+w2r(14)));
                    ctx.stroke();
                    // 照準クロスヘア
                    ctx.lineWidth=1; ctx.globalAlpha=baseAlpha*0.5;
                    const cx3=ex+Math.cos(ang)*(baseR+w2r(14)), cy3=ey+Math.sin(ang)*(baseR+w2r(14));
                    const cs2=w2r(4);
                    ctx.beginPath();ctx.moveTo(cx3-Math.cos(ang+Math.PI/2)*cs2,cy3-Math.sin(ang+Math.PI/2)*cs2);
                    ctx.lineTo(cx3+Math.cos(ang+Math.PI/2)*cs2,cy3+Math.sin(ang+Math.PI/2)*cs2);ctx.stroke();
                    break;}
            }
            ctx.globalAlpha=baseAlpha;

            // ── クールダウン円グラフ（CDあり敵＋特殊タイマー） ──
            const pieR=baseR*0.45;
            let cdRate=-1; // -1=表示なし
            if(!spawning){
                if(e.type===4&&e.gliderTimer){
                    // グライダー: 爆発まで残り時間
                    cdRate=e.gliderTimer/(480+240);
                } else if(e.type===7&&e.splitTimer){
                    cdRate=e.splitTimer/480;
                } else if(e.type==='7m'&&e.splitTimer){
                    cdRate=e.splitTimer/280;
                } else if(e.type==='7s'&&e.vanishTimer&&e.vanishMax){
                    // 消滅タイマー
                    cdRate=e.vanishTimer/e.vanishMax;
                } else if(e.cdMax>0){
                    cdRate=Math.max(0,1-e.cd/e.cdMax);
                    // CDは「残量」ではなく「経過量」なのでそのまま表示
                    cdRate=Math.max(0,cdRate);
                }
            }
            if(cdRate>=0){
                ctx.fillStyle=color; ctx.globalAlpha=baseAlpha*0.75;
                ctx.beginPath(); ctx.moveTo(ex,ey);
                ctx.arc(ex,ey,pieR,-Math.PI/2,-Math.PI/2+Math.max(0.001,cdRate)*Math.PI*2);
                ctx.closePath(); ctx.fill();
            }

            // ワーパー予告
            if(e.preview){
                const pulse=Math.abs(Math.sin(tickCount*0.2));
                ctx.globalAlpha=(0.3+pulse*0.4)*baseAlpha;
                ctx.strokeStyle='#f77';ctx.lineWidth=1;
                ctx.shadowColor='#f77';ctx.shadowBlur=8;
                ctx.setLineDash([4,4]);
                ctx.beginPath();ctx.arc(w2sx(e.preview.x),w2sy(e.preview.y),w2r(40),0,Math.PI*2);ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.setLineDash([]);
        });

        // ウォール描画（別処理）
        enemies.forEach(e=>{
            if(e.type!==10||!e.wallInit)return;
            const color=eColors[10];
            const pulse=0.7+0.3*Math.abs(Math.sin(tickCount*0.08));
            const invAlpha=invincible>0?0.30:1.0; // 点滅せず一定の薄さ
            ctx.strokeStyle=color;ctx.lineWidth=w2r(4)*pulse;
            ctx.shadowColor=color;ctx.shadowBlur=16;
            ctx.globalAlpha=(e.spawnFlash>0?Math.min(0.5,e.spawnFlash/90*0.5):0.9)*invAlpha;
            if(e.wallAxis==='h'){
                const wy=w2sy(e.wallPos);
                const gc=w2sx(e.wallGap),gw=w2r(e.wallGapSize);
                ctx.beginPath();ctx.moveTo(fL,wy);ctx.lineTo(gc-gw/2,wy);ctx.stroke();
                ctx.beginPath();ctx.moveTo(gc+gw/2,wy);ctx.lineTo(fR,wy);ctx.stroke();
                ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
                ctx.beginPath();ctx.moveTo(gc-gw/2,wy-w2r(14));ctx.lineTo(gc-gw/2,wy+w2r(14));ctx.stroke();
                ctx.beginPath();ctx.moveTo(gc+gw/2,wy-w2r(14));ctx.lineTo(gc+gw/2,wy+w2r(14));ctx.stroke();
                ctx.setLineDash([]);
            } else {
                const wx=w2sx(e.wallPos);
                const gc=w2sy(e.wallGap),gw=w2r(e.wallGapSize);
                ctx.beginPath();ctx.moveTo(wx,fT);ctx.lineTo(wx,gc-gw/2);ctx.stroke();
                ctx.beginPath();ctx.moveTo(wx,gc+gw/2);ctx.lineTo(wx,fB);ctx.stroke();
                ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
                ctx.beginPath();ctx.moveTo(wx-w2r(14),gc-gw/2);ctx.lineTo(wx+w2r(14),gc-gw/2);ctx.stroke();
                ctx.beginPath();ctx.moveTo(wx-w2r(14),gc+gw/2);ctx.lineTo(wx+w2r(14),gc+gw/2);ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.globalAlpha=1;ctx.shadowBlur=0;
        });
    }

    // Mines
    if(!deathSequence){
        mines.forEach(m=>{
            const mx=w2sx(m.x), my=w2sy(m.y);
            if(m.exploding){
                const t=m.explodeR/m.maxR;
                ctx.globalAlpha=(1-t)*0.9;
                ctx.strokeStyle='#f80'; ctx.lineWidth=2;
                ctx.shadowColor='#f80'; ctx.shadowBlur=16;
                ctx.beginPath(); ctx.arc(mx,my,w2r(m.explodeR),0,Math.PI*2); ctx.stroke();
                ctx.globalAlpha=(1-t)*0.3;
                ctx.fillStyle='#f80';
                ctx.beginPath(); ctx.arc(mx,my,w2r(m.explodeR),0,Math.PI*2); ctx.fill();
                ctx.globalAlpha=1; ctx.shadowBlur=0;
            } else {
                const warn=(m.timer<80); // 爆発前警告
                const pulse=warn?(0.5+0.5*Math.abs(Math.sin(tickCount*0.25))):0.6;
                ctx.globalAlpha=pulse;
                const col=warn?'#ff4':'#f80';
                ctx.strokeStyle=col; ctx.lineWidth=warn?2:1.2;
                ctx.shadowColor=col; ctx.shadowBlur=warn?14:6;
                // 菱形マーカー
                const mr=w2r(7);
                ctx.beginPath();
                ctx.moveTo(mx,my-mr); ctx.lineTo(mx+mr,my);
                ctx.lineTo(mx,my+mr); ctx.lineTo(mx-mr,my); ctx.closePath();
                ctx.stroke();
                if(warn){
                    ctx.globalAlpha=pulse*0.4;
                    ctx.beginPath(); ctx.arc(mx,my,w2r(m.maxR*0.4*(1-m.timer/80)),0,Math.PI*2); ctx.stroke();
                }
                ctx.globalAlpha=1; ctx.shadowBlur=0;
            }
        });
    }

    // Bombs（ボマー）
    if(!deathSequence){
        bombs.forEach(b=>{
            if(b.exploded){
                const t2=b.explodeR/b.maxR;
                ctx.globalAlpha=(1-t2)*0.9;
                ctx.strokeStyle='#ff9900';ctx.lineWidth=2.5;ctx.shadowColor='#ff9900';ctx.shadowBlur=20;
                ctx.beginPath();ctx.arc(w2sx(b.targetX),w2sy(b.targetY),w2r(b.explodeR),0,Math.PI*2);ctx.stroke();
                ctx.globalAlpha=(1-t2)*0.35;ctx.fillStyle='#ff9900';
                ctx.beginPath();ctx.arc(w2sx(b.targetX),w2sy(b.targetY),w2r(b.explodeR),0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=1;ctx.shadowBlur=0;
            } else {
                // 飛行中の爆弾
                const bx=w2sx(b.x),by=w2sy(b.y);
                ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;ctx.shadowColor='#ffcc00';ctx.shadowBlur=12;
                ctx.globalAlpha=1;
                ctx.beginPath();ctx.arc(bx,by,w2r(5),0,Math.PI*2);ctx.stroke();
                ctx.fillStyle='#ffcc00';ctx.globalAlpha=0.6;
                ctx.beginPath();ctx.arc(bx,by,w2r(3),0,Math.PI*2);ctx.fill();
                // 着弾予告マーカー
                const tx2=w2sx(b.targetX),ty2=w2sy(b.targetY);
                const progress=1-b.life/b.maxLife;
                const pulse=0.4+0.4*Math.abs(Math.sin(tickCount*0.25));
                ctx.globalAlpha=pulse*0.8;
                ctx.strokeStyle='#ffaa00';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
                ctx.beginPath();ctx.arc(tx2,ty2,w2r(b.maxR*(0.3+progress*0.4)),0,Math.PI*2);ctx.stroke();
                ctx.setLineDash([]);
                // 十字マーカー
                const mSize=w2r(10);
                ctx.strokeStyle='#ffdd00';ctx.lineWidth=1.2;
                ctx.beginPath();ctx.moveTo(tx2-mSize,ty2);ctx.lineTo(tx2+mSize,ty2);ctx.stroke();
                ctx.beginPath();ctx.moveTo(tx2,ty2-mSize);ctx.lineTo(tx2,ty2+mSize);ctx.stroke();
                ctx.globalAlpha=1;ctx.shadowBlur=0;
            }
        });
    }

    // Vortex bullets（ボルテックス螺旋弾）
    if(!deathSequence){
        vortexBullets.forEach(b=>{
            const t2=b.life/220;
            ctx.globalAlpha=t2*0.9;
            ctx.strokeStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=10;ctx.lineWidth=1.5;
            ctx.beginPath();ctx.arc(w2sx(b.x),w2sy(b.y),w2r(3.5),0,Math.PI*2);ctx.stroke();
            ctx.globalAlpha=1;ctx.shadowBlur=0;
        });
    }

    // Laser beams（レーザー）
    if(!deathSequence){
        laserBeams.forEach(lb=>{
            const cos=Math.cos(lb.angle),sin=Math.sin(lb.angle);
            const ox2=w2sx(lb.ox),oy2=w2sy(lb.oy);
            const reach=w2r(fieldSize*2.5);
            if(lb.warmup>0){
                // 予告ライン（細い点線）
                const prog=1-lb.warmup/35;
                ctx.globalAlpha=0.3+prog*0.5;
                ctx.strokeStyle=lb.color;ctx.lineWidth=1;ctx.shadowColor=lb.color;ctx.shadowBlur=8;
                ctx.setLineDash([6,6]);
                ctx.beginPath();ctx.moveTo(ox2,oy2);ctx.lineTo(ox2+cos*reach,oy2+sin*reach);ctx.stroke();
                ctx.setLineDash([]);
                // 照準点フラッシュ
                ctx.globalAlpha=prog*0.8;
                ctx.strokeStyle='#fff';ctx.lineWidth=2;
                ctx.beginPath();ctx.arc(ox2,oy2,w2r(14),lb.angle-0.3,lb.angle+0.3);ctx.stroke();
                ctx.globalAlpha=1;ctx.shadowBlur=0;
            } else if(lb.active>0){
                // 発射中（極細だが強いグロウ）
                ctx.globalAlpha=1;
                ctx.strokeStyle='#ffffff';ctx.lineWidth=2.5;ctx.shadowColor=lb.color;ctx.shadowBlur=30;
                ctx.beginPath();ctx.moveTo(ox2,oy2);ctx.lineTo(ox2+cos*reach,oy2+sin*reach);ctx.stroke();
                ctx.strokeStyle=lb.color;ctx.lineWidth=1.5;ctx.shadowBlur=15;
                ctx.beginPath();ctx.moveTo(ox2,oy2);ctx.lineTo(ox2+cos*reach,oy2+sin*reach);ctx.stroke();
                ctx.shadowBlur=0;
            } else {
                // 消えかけ
                const fade=lb.life/8;
                ctx.globalAlpha=fade*0.5;
                ctx.strokeStyle=lb.color;ctx.lineWidth=1;ctx.shadowColor=lb.color;ctx.shadowBlur=8;
                ctx.beginPath();ctx.moveTo(ox2,oy2);ctx.lineTo(ox2+cos*reach,oy2+sin*reach);ctx.stroke();
                ctx.globalAlpha=1;ctx.shadowBlur=0;
            }
        });
    }

    // Bullets
    bullets.forEach(b=>{
        const bc=b.color||'#ff5';
        ctx.shadowColor=bc; ctx.shadowBlur=10; ctx.strokeStyle=bc; ctx.lineWidth=1.5;
        ctx.globalAlpha=1;
        ctx.beginPath(); ctx.arc(w2sx(b.x),w2sy(b.y),w2r(4),0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=0.3;
        ctx.beginPath(); ctx.arc(w2sx(b.x-b.vx*2),w2sy(b.y-b.vy*2),w2r(2),0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;
    });
    ctx.shadowBlur=0;

    // Explosions
    explosions.forEach(ex=>{
        const t=1-ex.life/40; ctx.globalAlpha=(1-t)*0.8;
        ctx.strokeStyle='#f88'; ctx.lineWidth=1.5; ctx.shadowColor='#f88'; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(w2sx(ex.x),w2sy(ex.y),w2r(Math.min(ex.r,ex.max)),0,Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0;
    });
    ctx.globalAlpha=1;

    // Particles
    particles.forEach(p=>{
        const t=p.life/p.maxLife; ctx.globalAlpha=t*0.9;
        ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(w2sx(p.x),w2sy(p.y),w2r(p.size*t),0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
    });
    ctx.globalAlpha=1;

    ctx.restore(); // clip解除

    // ── 枠ボーダー（clipの外・スクリーン固定） ──
    ctx.strokeStyle='#0af'; ctx.lineWidth=1.5;
    ctx.shadowColor='#0af'; ctx.shadowBlur=12;
    ctx.strokeRect(fL,fT,FSH*2,FSH*2);
    ctx.shadowBlur=0;
    const cs=24;
    ctx.strokeStyle='#0ff'; ctx.lineWidth=2; ctx.shadowColor='#0ff'; ctx.shadowBlur=8;
    [[fL,fT,1,1],[fR,fT,-1,1],[fR,fB,-1,-1],[fL,fB,1,-1]].forEach(([bx,by,dx2,dy2])=>{
        ctx.beginPath();
        ctx.moveTo(bx+dx2*cs,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+dy2*cs);
        ctx.stroke();
    });
    ctx.shadowBlur=0;

    // ── 死亡演出ポストプロセス ──
    if(deathSequence){
        const zp=Math.min(deathTimer/80,1);
        const eased=1-Math.pow(1-zp,3);
        const spx=w2sx(deathPlayerX), spy2=w2sy(deathPlayerY);
        const spotR=Math.max(30,280*(1-eased*0.85));
        const gg=ctx.createRadialGradient(spx,spy2,0,spx,spy2,spotR*0.6);
        gg.addColorStop(0,`rgba(255,160,60,${eased*0.15})`);
        gg.addColorStop(0.4,`rgba(255,80,30,${eased*0.07})`);
        gg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gg; ctx.fillRect(0,0,W,H);
    }

    // ── スローモーションヴィニェット ──
    if(!deathSequence&&slowMotion>0){
        const vm=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.7);
        vm.addColorStop(0,'transparent');
        vm.addColorStop(1,`rgba(180,0,0,${(slowMotion/30)*0.35})`);
        ctx.fillStyle=vm; ctx.fillRect(0,0,W,H);
        ctx.globalAlpha=(slowMotion/30)*0.4; ctx.fillStyle='#f44';
        ctx.font=`10px 'Share Tech Mono',monospace`;
        ctx.textAlign='right'; ctx.textBaseline='top';
        ctx.fillText('// IMPACT //',W-20,H-30);
        ctx.globalAlpha=1;
    }
}

         const ang=-Math.PI/6;const cx=36+Math.cos(ang)*22,cy=36+Math.sin(ang)*22;

         c.beginPath();c.moveTo(cx,cy-7);c.lineTo(cx+5,cy);c.lineTo(cx,cy+7);c.lineTo(cx-5,cy);c.closePath();c.stroke();
     }},
    {type:9, name:'BOMBER', nameJa:'ボマー', color:'#ffcc00',
     desc:'直線軌道で爆弾を投擲。着弾点に予告マーカーが表示され、着弾時に広範囲爆発。',
     stats:['速度:低','行動:追尾、射撃、爆発','弾速:中','爆発半径:中','登場:終盤'],
     draw(c,t){
         c.strokeStyle='#ffcc00';c.lineWidth=2;c.shadowColor='#ffcc00';c.shadowBlur=12;
         c.beginPath();c.arc(36,36,13,0,Math.PI*2);c.stroke();
         c.lineWidth=1.5;c.strokeStyle='rgba(255,200,0,0.85)';
         c.beginPath();c.moveTo(36,23);c.quadraticCurveTo(46,17,44,12);c.stroke();
         const spark=Math.abs(Math.sin(t*0.3));
         c.fillStyle=`rgba(255,240,100,${spark})`;c.beginPath();c.arc(44,12,3,0,Math.PI*2);c.fill();
         c.fillStyle='#ffcc00';c.beginPath();c.arc(36,36,5,0,Math.PI*2);c.fill();
     }},
    {type:10, name:'WALL', nameJa:'ウォール', color:'#ff3344',
     desc:'フィールドを横断する壁体。隙間が1箇所だけあり、通過できる。壁は通過後に消える。',
     stats:['速度:低','行動:駆け抜け','登場:終盤'],
     draw(c,t){
         c.strokeStyle='#ff3344';c.lineWidth=4;c.shadowColor='#ff3344';c.shadowBlur=12;
         const pulse=0.7+0.3*Math.abs(Math.sin(t*0.08));
         c.globalAlpha=pulse;
         c.beginPath();c.moveTo(10,36);c.lineTo(27,36);c.stroke();
         c.beginPath();c.moveTo(45,36);c.lineTo(62,36);c.stroke();
         c.strokeStyle='rgba(255,255,255,0.5)';c.lineWidth=1;c.setLineDash([3,3]);
         c.beginPath();c.moveTo(27,26);c.lineTo(27,46);c.stroke();
         c.beginPath();c.moveTo(45,26);c.lineTo(45,46);c.stroke();
         c.setLineDash([]);c.globalAlpha=1;
     }},
    {type:11, name:'VORTEX', nameJa:'ボルテックス', color:'#cc44ff',
     desc:'フィールド中央で回転しながら3方向に螺旋弾を放出。弾が累積してフィールドを埋めていく。',
     stats:['速度:低','行動:射撃','弾速:中','登場:終盤'],
     draw(c,t){
         c.strokeStyle='#cc44ff';c.lineWidth=1.8;c.shadowColor='#cc44ff';c.shadowBlur=12;
         c.beginPath();c.arc(36,36,11,0,Math.PI*2);c.stroke();
         const vAngle=t*0.04;
         for(let arm=0;arm<3;arm++){
             const a=vAngle+arm*Math.PI*2/3;
             c.lineWidth=1.2;c.strokeStyle='rgba(200,100,255,0.9)';
             c.beginPath();c.moveTo(36+Math.cos(a)*11,36+Math.sin(a)*11);c.lineTo(36+Math.cos(a)*22,36+Math.sin(a)*22);c.stroke();
             c.strokeStyle='rgba(200,100,255,0.45)';c.lineWidth=1;
             c.beginPath();c.arc(36+Math.cos(a)*24,36+Math.sin(a)*24,3,0,Math.PI*2);c.stroke();
         }
     }},
    {type:12, name:'LASER', nameJa:'レーザー', color:'#ff22aa',
     desc:'0.5秒の予告ラインの後、極細レーザーをフィールド端まで貫通。回避猶予が短い。',
     stats:['速度:低','行動:ビーム','弾速:高速','登場:終盤'],
     draw(c,t){
         c.strokeStyle='#ff22aa';c.lineWidth=1.8;c.shadowColor='#ff22aa';c.shadowBlur=12;
         c.beginPath();c.arc(36,36,11,0,Math.PI*2);c.stroke();
         // 右方向に照準ライン＋クロスヘア
         const ang=Math.PI/8;const br=11;
         c.lineWidth=1.3;
         c.beginPath();c.moveTo(36+Math.cos(ang)*br,36+Math.sin(ang)*br);c.lineTo(36+Math.cos(ang)*(br+16),36+Math.sin(ang)*(br+16));c.stroke();
         const cx=36+Math.cos(ang)*(br+16),cy=36+Math.sin(ang)*(br+16);
         c.lineWidth=1;c.globalAlpha=0.55;
         c.beginPath();c.moveTo(cx-Math.cos(ang+Math.PI/2)*5,cy-Math.sin(ang+Math.PI/2)*5);c.lineTo(cx+Math.cos(ang+Math.PI/2)*5,cy+Math.sin(ang+Math.PI/2)*5);c.stroke();
         c.globalAlpha=1;
         // 予告ライン（点滅）
         const prog=Math.abs(Math.sin(t*0.05));
         c.strokeStyle=`rgba(255,50,180,${prog*0.6})`;c.lineWidth=1;c.setLineDash([4,4]);
         c.beginPath();c.moveTo(36+Math.cos(ang)*(br+16),36+Math.sin(ang)*(br+16));c.lineTo(36+Math.cos(ang)*58,36+Math.sin(ang)*58);c.stroke();
         c.setLineDash([]);
     }},
];

let bestiaryTick=0;
let bestiaryRAF=null;

function showBestiary(){
    document.getElementById('title').style.display='none';
    const panel=document.getElementById('bestiary');
    panel.style.display='flex';
    const grid=document.getElementById('bestiary-grid');
    grid.innerHTML='';

    ENEMY_DATA.forEach((data,idx)=>{
        // ── 外枠（perspective container） ──
        const wrap=document.createElement('div');
        wrap.className='beast-card-wrap';

        // ── フリップカード本体 ──
        const card=document.createElement('div');
        card.className='beast-card';

        // ── 表面（テキスト情報） ──
        const face=document.createElement('div');
        face.className='beast-face';
        const faceInfo=document.createElement('div');
        faceInfo.className='beast-info';
        faceInfo.innerHTML=`
            <div class="beast-name" style="color:${data.color}">${data.name}</div>
            <span class="beast-type-tag" style="color:${data.color}">${data.nameJa}</span>
            <div class="beast-desc">${data.desc}</div>
            <div class="beast-stat">${data.stats.map(s=>`<span style="color:${data.color}">${s}</span>`).join('')}</div>
            <div class="flip-hint" style="color:${data.color}">▶ TAP TO PREVIEW</div>`;
        face.appendChild(faceInfo);

        // ── 裏面（アイコン canvas） ──
        const back=document.createElement('div');
        back.className='beast-back';
        const cvs=document.createElement('canvas');
        cvs.className='beast-canvas'; cvs.width=72; cvs.height=72;
        const backLabel=document.createElement('div');
        backLabel.style.cssText=`font-family:'Orbitron',monospace;font-size:11px;letter-spacing:0.2em;color:${data.color}`;
        backLabel.textContent=data.name;
        const backHint=document.createElement('div');
        backHint.className='flip-hint';backHint.style.color=data.color;backHint.textContent='▶ TAP TO CLOSE';
        back.appendChild(cvs); back.appendChild(backLabel); back.appendChild(backHint);

        card.appendChild(face); card.appendChild(back);
        wrap.appendChild(card);
        grid.appendChild(wrap);

        // タップでフリップ
        wrap.addEventListener('click',()=>{
            card.classList.toggle('flipped');
        });
    });

    // アニメーションループ（裏向きcanvasも描画）
    function animateBestiary(){
        bestiaryTick++;
        const canvases=grid.querySelectorAll('.beast-canvas');
        ENEMY_DATA.forEach((data,i)=>{
            const c=canvases[i]&&canvases[i].getContext('2d');
            if(!c)return;
            c.clearRect(0,0,72,72);
            c.shadowBlur=0;c.globalAlpha=1;
            if(c.setLineDash)c.setLineDash([]);
            data.draw(c,bestiaryTick);
        });
        bestiaryRAF=requestAnimationFrame(animateBestiary);
    }
    if(bestiaryRAF) cancelAnimationFrame(bestiaryRAF);
    animateBestiary();
}

function closeBestiary(){
    document.getElementById('bestiary').style.display='none';
    document.getElementById('title').style.display='flex';
    if(bestiaryRAF){ cancelAnimationFrame(bestiaryRAF); bestiaryRAF=null; }
}

/* ===== SCREENSHOT / X SHARE ===== */
let deathScreenshot=null; // DataURL of captured frame
let screenshotTimer=0;    // 最後にキャプチャしてからのフレーム数

/* ===== PER-CHARACTER HIGHSCORE ===== */
const HS_KEY='dassha_hs_v1';
function loadHighscores(){
    try{ return JSON.parse(localStorage.getItem(HS_KEY))||{}; }catch(e){ return {}; }
}
function saveHighscore(charIdx, timeMs){
    const hs=loadHighscores();
    const prev=hs[charIdx]||0;
    const isNew=timeMs>prev;
    if(isNew) hs[charIdx]=timeMs;
    try{ localStorage.setItem(HS_KEY,JSON.stringify(hs)); }catch(e){}
    return isNew;
}
function getHighscore(charIdx){
    const hs=loadHighscores();
    return hs[charIdx]||0;
}
function formatTime(ms){
    const m=Math.floor(ms/60000);
    const s=Math.floor((ms/1000)%60);
    const mi=Math.floor(ms%1000);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(mi).padStart(3,'0')}`;
}

const CHAR_NAMES=['CLICKER','SWIPER','ANCHOR','ORBITER','WARPER'];

// ゲームループ内で毎秒ごとに「5秒前」スクショを更新
function tryCapturePrescreenshot(){
    screenshotTimer--;
    if(screenshotTimer>0)return;
    screenshotTimer=60; // 1秒ごとに更新
    // 小さいcanvasにコピー
    const sc=document.getElementById('death-screenshot');
    sc.width=canvas.width; sc.height=canvas.height;
    const sctx=sc.getContext('2d');
    sctx.drawImage(canvas,0,0);
    // 5秒分のバッファを保持（1秒ごとに更新 → 最新=約1秒前）
    // より忠実に: 5秒分のキューを維持
    deathScreenshot=canvas.toDataURL('image/jpeg',0.5);
}

// 5秒前スクショのリングバッファ
let _ssQueue=[];
const _SS_INTERVAL=60; // 1秒ごと
const _SS_KEEP=6;      // 6枚 → 最古=約6秒前
let _ssTimer=0;

function updateScreenshotBuffer(){
    _ssTimer--;
    if(_ssTimer>0)return;
    _ssTimer=_SS_INTERVAL;
    _ssQueue.push(canvas.toDataURL('image/jpeg',0.45));
    if(_ssQueue.length>_SS_KEEP)_ssQueue.shift();
}

function shareToX(){
    const timeEl=document.getElementById('time');
    const charName=CHAR_NAMES[charType]||'UNKNOWN';
    const hsMs=getHighscore(charType);
    const isNew=window._lastScoreIsNew||false;
    const hsStr=hsMs>0?`🏆 BEST: ${formatTime(hsMs)}`:'';
    const newTag=isNew?'\n🆕 NEW RECORD!':'';
    const text=`【DASSHA】\n⏱ ${timeEl.textContent}\n🎮 ${charName}${newTag}\n${hsStr}\n#DASSHA #回避ゲー`;
    const url=`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
    window.open(url,'_blank','noopener');
}

/* ===== GAME OVER ===== */
function gameOver(){
    running=false;
    deathSequence=false;
    document.getElementById("hp-display").style.display="none";
    document.getElementById("live-timer").style.display="none";
    const time=gameTime;
    const ms=Math.floor(time%1000);
    const sec=Math.floor((time/1000)%60);
    const min=Math.floor(time/60000);
    const timeStr=`${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
    document.getElementById("time").textContent=timeStr;

    // スクリーンショット表示
    const sc=document.getElementById('death-screenshot');
    if(_ssQueue.length>0){
        const img=new Image();
        img.onload=()=>{
            sc.width=img.width; sc.height=img.height;
            sc.getContext('2d').drawImage(img,0,0);
            sc.style.display='block';
        };
        const ssIdx=Math.max(0,_ssQueue.length-6);
        img.src=_ssQueue[ssIdx]||_ssQueue[0];
    }

    // キャラ別ハイスコア
    const isNew=saveHighscore(charType, gameTime);
    window._lastScoreIsNew=isNew;
    const hsMs=getHighscore(charType);
    const charName=CHAR_NAMES[charType]||'UNKNOWN';
    const charNameEl=document.getElementById('score-char-name');
    let hsText=`// ${charName} // BEST: ${formatTime(hsMs)}`;
    if(isNew) hsText+=`  ★ NEW RECORD!`;
    charNameEl.textContent=hsText;
    charNameEl.style.color=isNew?'#ff0':'rgba(0,200,255,0.5)';
    if(isNew) charNameEl.style.animation='hsNew 0.8s ease-in-out infinite alternate';
    else charNameEl.style.animation='';
    document.getElementById('score-preview').style.display='block';

    document.getElementById("ui").style.display="flex";
}

/* ===== LOOP ===== */
function loop(now){
    if(running||deathSequence)update(now);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
