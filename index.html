<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DASSHA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{
    background:#000;
    overflow:hidden;
    touch-action:none;
    width:100%;height:100%;
    font-family:'Share Tech Mono',monospace;
}
canvas{display:block;position:fixed;inset:0;}

/* ===== OVERLAY PANELS ===== */
#title,#select,#ui{
    position:fixed;inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    pointer-events:none;
}
#title,#select,#ui{pointer-events:all;}
#select{display:none;}
#ui{display:none;}

/* scan-line overlay */
body::after{
    content:'';
    position:fixed;inset:0;
    background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
    );
    pointer-events:none;
    z-index:999;
}

/* ===== TITLE SCREEN ===== */
.title-glitch{
    font-family:'Orbitron',monospace;
    font-weight:900;
    font-size:clamp(48px,12vw,96px);
    color:#fff;
    text-shadow:
        0 0 10px #0ff,
        0 0 30px #0ff,
        0 0 80px #0af,
        0 0 140px #07f;
    letter-spacing:0.3em;
    animation: glitch 4s infinite;
    position:relative;
}
@keyframes glitch{
    0%,94%,100%{transform:none;opacity:1;}
    95%{transform:skewX(-8deg) translateX(-4px);opacity:0.8;filter:hue-rotate(90deg);}
    96%{transform:skewX(6deg) translateX(4px);opacity:0.9;}
    97%{transform:none;}
    98%{transform:skewX(-3deg);filter:hue-rotate(-60deg);}
    99%{transform:none;opacity:1;}
}

.title-sub{
    font-size:clamp(10px,2vw,14px);
    color:#0af;
    letter-spacing:0.5em;
    margin-top:8px;
    margin-bottom:50px;
    opacity:0.7;
    text-transform:uppercase;
}

/* ===== NEO-BUTTON ===== */
.neo-btn{
    position:relative;
    font-family:'Orbitron',monospace;
    font-weight:700;
    font-size:clamp(12px,3vw,16px);
    letter-spacing:0.2em;
    color:#0ff;
    background:transparent;
    border:1px solid #0ff;
    padding:14px 48px;
    margin:10px;
    cursor:pointer;
    clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
    transition:all 0.15s;
    text-transform:uppercase;
    outline:none;
}
.neo-btn::before{
    content:'';
    position:absolute;inset:0;
    background:rgba(0,255,255,0.06);
    clip-path:inherit;
    transition:background 0.15s;
}
.neo-btn:hover{
    color:#000;
    border-color:#0ff;
    text-shadow:none;
    box-shadow:0 0 20px #0ff,0 0 40px #0af;
}
.neo-btn:hover::before{background:rgba(0,255,255,0.9);}
.neo-btn:active{transform:scale(0.96);}

.neo-btn.red{color:#f55;border-color:#f55;}
.neo-btn.red::before{background:rgba(255,80,80,0.06);}
.neo-btn.red:hover{color:#000;box-shadow:0 0 20px #f55,0 0 40px #f33;}
.neo-btn.red:hover::before{background:rgba(255,80,80,0.9);}

.neo-btn.yellow{color:#ff0;border-color:#ff0;}
.neo-btn.yellow::before{background:rgba(255,255,0,0.06);}
.neo-btn.yellow:hover{color:#000;box-shadow:0 0 20px #ff0,0 0 40px #fa0;}
.neo-btn.yellow:hover::before{background:rgba(255,255,0,0.9);}

/* ===== SELECT SCREEN ===== */
.select-title{
    font-family:'Orbitron',monospace;
    font-size:clamp(14px,3vw,20px);
    color:#0af;
    letter-spacing:0.4em;
    margin-bottom:36px;
    text-transform:uppercase;
}
.char-grid{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}
.char-card{
    position:relative;
    border:1px solid rgba(0,200,255,0.3);
    background:rgba(0,10,20,0.8);
    padding:24px 20px 20px;
    width:160px;
    text-align:center;
    cursor:pointer;
    transition:all 0.2s;
    clip-path:polygon(12px 0%,100% 0%,100% calc(100% - 12px),calc(100% - 12px) 100%,0% 100%,0% 12px);
}
.char-card:hover{
    border-color:#0ff;
    background:rgba(0,30,50,0.9);
    transform:translateY(-4px);
    box-shadow:0 8px 30px rgba(0,255,255,0.2),inset 0 0 20px rgba(0,255,255,0.05);
}
.char-card:active{transform:scale(0.95);}
.char-icon{
    font-size:36px;
    margin-bottom:12px;
    display:block;
}
.char-name{
    font-family:'Orbitron',monospace;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.15em;
    color:#0ff;
    margin-bottom:8px;
}
.char-desc{
    font-size:10px;
    color:rgba(0,200,200,0.6);
    line-height:1.5;
    letter-spacing:0.05em;
}

/* ===== GAME OVER UI ===== */
.gameover-title{
    font-family:'Orbitron',monospace;
    font-weight:900;
    font-size:clamp(28px,7vw,56px);
    color:#f44;
    text-shadow:0 0 20px #f44,0 0 60px #f00;
    letter-spacing:0.3em;
    margin-bottom:16px;
    animation:flickerRed 0.5s ease-in-out;
}
@keyframes flickerRed{
    0%{opacity:0;transform:scaleX(1.2);}
    40%{opacity:1;}
    60%{opacity:0.7;}
    80%{opacity:1;}
    100%{opacity:1;transform:scaleX(1);}
}
.time-display{
    font-family:'Share Tech Mono',monospace;
    font-size:clamp(14px,3.5vw,22px);
    color:#0af;
    letter-spacing:0.15em;
    margin-bottom:40px;
    padding:12px 28px;
    border:1px solid rgba(0,180,255,0.3);
    background:rgba(0,10,30,0.7);
    clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.time-label{
    font-size:0.7em;
    color:rgba(0,180,255,0.5);
    display:block;
    margin-bottom:4px;
    letter-spacing:0.3em;
}
.time-value{
    color:#fff;
}

/* HP dots */
#hp-display{
    position:fixed;
    top:20px;left:50%;
    transform:translateX(-50%);
    display:none;
    gap:10px;
    z-index:100;
    align-items:center;
}
.hp-pip{
    width:12px;height:12px;
    border:1px solid #f44;
    background:#f44;
    box-shadow:0 0 8px #f44,0 0 16px #f22;
    transition:all 0.3s;
    clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
}
.hp-pip.empty{
    background:transparent;
    box-shadow:none;
    border-color:rgba(255,80,80,0.25);
}

/* Timer live */
#live-timer{
    position:fixed;
    top:20px;right:20px;
    font-size:13px;
    color:rgba(0,200,255,0.5);
    letter-spacing:0.15em;
    display:none;
    z-index:100;
}

/* ===== BESTIARY ===== */
#bestiary{
    position:fixed;inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    background:rgba(0,2,8,0.97);
    z-index:200;
    overflow-y:auto;
    padding:40px 20px 60px;
}
.bestiary-title{
    font-family:'Orbitron',monospace;
    font-size:clamp(16px,4vw,24px);
    color:#0ff;
    letter-spacing:0.5em;
    margin-bottom:8px;
    text-shadow:0 0 20px #0ff;
}
.bestiary-sub{
    font-size:10px;color:rgba(0,200,255,0.4);
    letter-spacing:0.3em;margin-bottom:36px;
}
.bestiary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:16px;
    width:100%;max-width:960px;
}
.beast-card-wrap{
    perspective:600px;
    cursor:pointer;
}
.beast-card{
    position:relative;
    width:100%;
    transform-style:preserve-3d;
    transition:transform 0.45s cubic-bezier(.4,0,.2,1);
    border:1px solid rgba(0,200,255,0.15);
    background:transparent;
}
.beast-card.flipped{
    transform:rotateY(180deg);
}
.beast-face,.beast-back{
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    padding:14px 16px 16px;
    background:rgba(0,8,20,0.92);
    border:1px solid rgba(0,200,255,0.15);
    clip-path:polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);
    box-sizing:border-box;
    width:100%;
}
.beast-face{
    display:block;
}
.beast-back{
    position:absolute;inset:0;
    transform:rotateY(180deg);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:8px;
}
.beast-canvas{
    width:72px;height:72px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.6);
    display:block;
}
.beast-info{flex:1;}
.beast-name{
    font-family:'Orbitron',monospace;
    font-size:12px;font-weight:700;
    letter-spacing:0.15em;
    margin-bottom:5px;
}
.beast-type-tag{
    font-size:9px;letter-spacing:0.2em;
    opacity:0.5;margin-bottom:8px;
    display:block;
}
.beast-desc{
    font-size:10px;color:rgba(200,220,255,0.65);
    line-height:1.7;letter-spacing:0.04em;
}
.beast-stat{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:5px 6px;
}
.beast-stat span{
    font-size:8.5px;
    padding:2px 6px;
    border:1px solid currentColor;
    opacity:0.7;
    letter-spacing:0.05em;
    white-space:nowrap;
}
.flip-hint{
    font-size:8px;letter-spacing:0.2em;
    opacity:0.35;margin-top:6px;
}
.bestiary-close{
    margin-top:48px;
}
/* ===== VOLUME SLIDERS ===== */
#volume-panel{
    margin-top:18px;
    display:flex;flex-direction:column;gap:8px;
    align-items:center;
    opacity:0.7;
}
.vol-row{
    display:flex;align-items:center;gap:10px;
    font-size:9px;letter-spacing:0.2em;color:#0af;
}
.vol-row label{width:36px;text-align:right;}
.vol-row input[type=range]{
    -webkit-appearance:none;appearance:none;
    width:100px;height:2px;
    background:rgba(0,180,255,0.3);
    border-radius:1px;outline:none;cursor:pointer;
}
.vol-row input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:10px;height:10px;
    background:#0ff;border-radius:50%;
    box-shadow:0 0 6px #0ff;
}
.vol-row span{width:26px;font-size:9px;color:#0ff;}
@keyframes hsNew{
    from{opacity:1;text-shadow:0 0 8px #ff0,0 0 20px #fa0;}
    to{opacity:0.6;text-shadow:0 0 2px #ff0;}
}
</style>
</head>
<body>
<canvas></canvas>

<!-- HP dots -->
<div id="hp-display">
    <div class="hp-pip" id="hp0"></div>
    <div class="hp-pip" id="hp1"></div>
    <div class="hp-pip" id="hp2"></div>
</div>

<!-- Live timer -->
<div id="live-timer" id="live-timer">00:00.000</div>


<!-- Title -->
<div id="title">
    <div class="title-glitch">DASSHA</div>
    <div class="title-sub">回避アクション // DODGE &amp; SURVIVE</div>
    <button class="neo-btn" onclick="showSelect()">START GAME</button>
    <button class="neo-btn" style="font-size:11px;padding:10px 36px;opacity:0.7;margin-top:-4px;" onclick="showBestiary()">// ENEMY LOG //</button>
    <div id="volume-panel">
        <div class="vol-row">
            <label>BGM</label>
            <input type="range" id="vol-bgm" min="0" max="100" value="40" oninput="setBgmVol(this.value)">
            <span id="vol-bgm-val">40</span>
        </div>
        <div class="vol-row">
            <label>SE</label>
            <input type="range" id="vol-se" min="0" max="100" value="60" oninput="setSeVol(this.value)">
            <span id="vol-se-val">60</span>
        </div>
        <div class="vol-row" style="justify-content:center;margin-top:4px;">
            <span style="font-size:9px;letter-spacing:0.15em;color:rgba(0,200,255,0.5);margin-right:10px;">GAME BGM</span>
            <button id="btn-bgm-switch" onclick="switchGameBgm()" style="
                font-family:'Share Tech Mono',monospace;
                font-size:9px;letter-spacing:0.15em;
                color:rgba(0,200,255,0.7);
                background:rgba(0,8,20,0.6);
                border:1px solid rgba(0,200,255,0.3);
                padding:4px 14px;cursor:pointer;
            ">♫ TENSE</button>
        </div>
    </div>
</div>

<!-- Bestiary -->
<div id="bestiary">
    <div class="bestiary-title">// ENEMY LOG //</div>
    <div class="bestiary-sub">識別された敵性エンティティ — THREAT DATABASE</div>
    <div class="bestiary-grid" id="bestiary-grid"></div>
    <button class="neo-btn bestiary-close" onclick="closeBestiary()">← BACK</button>
</div>

<!-- Character Select -->
<div id="select">
    <div class="select-title">// SELECT UNIT //</div>
    <div class="char-grid">
        <div class="char-card" onclick="choose(0)">
            <svg width="54" height="54" viewBox="-27 -27 54 54" style="display:block;margin:0 auto 12px;">
                <!-- Clicker: cross/plus shape -->
                <circle cx="0" cy="0" r="17" fill="rgba(0,180,255,0.08)" stroke="rgba(0,180,255,0.3)" stroke-width="1"/>
                <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="none" stroke="#4df" stroke-width="1.5" stroke-linejoin="round"/>
                <circle cx="0" cy="0" r="2.5" fill="#8ef"/>
                <line x1="0" y1="-20" x2="0" y2="-14" stroke="#4df" stroke-width="1" opacity="0.5"/>
                <line x1="20" y1="0" x2="14" y2="0" stroke="#4df" stroke-width="1" opacity="0.5"/>
                <line x1="0" y1="20" x2="0" y2="14" stroke="#4df" stroke-width="1" opacity="0.5"/>
                <line x1="-20" y1="0" x2="-14" y2="0" stroke="#4df" stroke-width="1" opacity="0.5"/>
                <filter id="glow0"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <g filter="url(#glow0)">
                <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3" fill="none" stroke="#0ff" stroke-width="0.5"/>
                </g>
            </svg>
            <div class="char-name">CLICKER</div>
            <div class="char-desc">直線に動く瞬き</div>
        </div>
        <div class="char-card" onclick="choose(1)">
            <svg width="54" height="54" viewBox="-27 -27 54 54" style="display:block;margin:0 auto 12px;">
                <!-- Swiper: arrow/chevron pointing right -->
                <circle cx="0" cy="0" r="17" fill="rgba(0,140,255,0.08)" stroke="rgba(0,140,255,0.3)" stroke-width="1"/>
                <polygon points="-10,-10 6,0 -10,10 -6,0" fill="none" stroke="#29f" stroke-width="1.5" stroke-linejoin="round"/>
                <line x1="-14" y1="0" x2="-10" y2="0" stroke="#29f" stroke-width="1.5"/>
                <circle cx="0" cy="0" r="2" fill="#7bf" opacity="0.7"/>
                <filter id="glow1"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <g filter="url(#glow1)">
                <polygon points="-10,-10 6,0 -10,10 -6,0" fill="rgba(40,160,255,0.2)" stroke="#5af" stroke-width="0.5"/>
                </g>
            </svg>
            <div class="char-name">SWIPER</div>
            <div class="char-desc">スワイプで曲がる突進</div>
        </div>
        <div class="char-card" onclick="choose(2)">
            <svg width="54" height="54" viewBox="-27 -27 54 54" style="display:block;margin:0 auto 12px;">
                <!-- Anchor: hexagon -->
                <circle cx="0" cy="0" r="17" fill="rgba(0,100,220,0.08)" stroke="rgba(0,100,220,0.3)" stroke-width="1"/>
                <polygon points="0,-13 11.3,-6.5 11.3,6.5 0,13 -11.3,6.5 -11.3,-6.5" fill="none" stroke="#06e" stroke-width="1.5" stroke-linejoin="round"/>
                <circle cx="0" cy="0" r="3" fill="none" stroke="#4af" stroke-width="1"/>
                <circle cx="0" cy="0" r="1.5" fill="#8cf"/>
                <filter id="glow2"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <g filter="url(#glow2)">
                <polygon points="0,-13 11.3,-6.5 11.3,6.5 0,13 -11.3,6.5 -11.3,-6.5" fill="rgba(0,100,255,0.15)" stroke="#08f" stroke-width="0.5"/>
                </g>
            </svg>
            <div class="char-name">ANCHOR</div>
            <div class="char-desc">円弧を周る均衡</div>
        </div>
        <div class="char-card" onclick="choose(3)">
            <svg width="54" height="54" viewBox="-27 -27 54 54" style="display:block;margin:0 auto 12px;">
                <!-- Orbiter: center dot + orbiting satellite -->
                <circle cx="0" cy="0" r="17" fill="rgba(180,0,255,0.08)" stroke="rgba(180,0,255,0.3)" stroke-width="1"/>
                <!-- orbit ring -->
                <circle cx="0" cy="0" r="11" fill="none" stroke="rgba(200,80,255,0.3)" stroke-width="0.8" stroke-dasharray="3,3"/>
                <!-- center -->
                <circle cx="0" cy="0" r="3" fill="none" stroke="#c4f" stroke-width="1.5"/>
                <circle cx="0" cy="0" r="1.2" fill="#e8f"/>
                <!-- satellite -->
                <circle cx="11" cy="0" r="3.5" fill="none" stroke="#d06f" stroke-width="1.5"/>
                <circle cx="11" cy="0" r="1.5" fill="#c4f"/>
                <filter id="glow3"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <g filter="url(#glow3)">
                <circle cx="11" cy="0" r="3.5" fill="rgba(180,0,255,0.2)" stroke="#b0f" stroke-width="0.5"/>
                </g>
            </svg>
            <div class="char-name">ORBITER</div>
            <div class="char-desc">カーソルを追従する衛星</div>
        </div>
        <div class="char-card" onclick="choose(4)">
            <svg width="54" height="54" viewBox="-27 -27 54 54" style="display:block;margin:0 auto 12px;">
                <!-- Warper: diamond with teleport rings -->
                <circle cx="0" cy="0" r="17" fill="rgba(255,180,0,0.06)" stroke="rgba(255,180,0,0.25)" stroke-width="1"/>
                <!-- teleport rings -->
                <circle cx="0" cy="0" r="14" fill="none" stroke="rgba(255,160,0,0.2)" stroke-width="0.8" stroke-dasharray="2,4"/>
                <circle cx="0" cy="0" r="9"  fill="none" stroke="rgba(255,160,0,0.35)" stroke-width="0.8" stroke-dasharray="2,3"/>
                <!-- diamond body -->
                <polygon points="0,-10 8,0 0,10 -8,0" fill="none" stroke="#fa0" stroke-width="1.5" stroke-linejoin="round"/>
                <polygon points="0,-5 4,0 0,5 -4,0" fill="rgba(255,180,0,0.2)" stroke="#fc4" stroke-width="0.8"/>
                <circle cx="0" cy="0" r="1.5" fill="#ffe"/>
                <!-- CD arc indicator (static preview) -->
                <path d="M 0 -6.5 A 6.5 6.5 0 0 1 5.6 -3.3" fill="none" stroke="#fc4" stroke-width="1.2" stroke-linecap="round"/>
                <filter id="glow4"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <g filter="url(#glow4)">
                <polygon points="0,-10 8,0 0,10 -8,0" fill="rgba(255,160,0,0.1)" stroke="#fb0" stroke-width="0.5"/>
                </g>
            </svg>
            <div class="char-name">WARPER</div>
            <div class="char-desc">ワープで動く琥珀</div>
        </div>
    </div><!-- /.char-grid -->
</div><!-- /#select -->

<!-- Game Over -->
<div id="ui">
    <div class="gameover-title">DESTROYED</div>
    <div class="time-display">
        <span class="time-label">SURVIVAL TIME</span>
        <span class="time-value" id="time"></span>
    </div>
    <div id="score-preview" style="margin:8px 0;font-size:10px;color:rgba(0,200,255,0.5);letter-spacing:0.15em;display:none;">
        <span id="score-char-name"></span>
    </div>
    <canvas id="death-screenshot" style="display:none;max-width:240px;max-height:240px;border:1px solid rgba(255,50,50,0.3);margin:8px 0;image-rendering:pixelated;"></canvas>
    <button class="neo-btn" id="btn-share-x" style="background:rgba(0,0,0,0.8);border-color:#1d9bf0;color:#1d9bf0;font-size:11px;padding:10px 28px;margin-top:4px;" onclick="shareToX()">𝕏 SHARE SCORE</button>
    <button class="neo-btn" onclick="restart()">RETRY</button>
    <button class="neo-btn" style="margin-top:4px;font-size:11px;padding:10px 32px;opacity:0.6;" onclick="goTitle()">TITLE</button>
</div>

<script>
const canvas = document.querySelector("canvas");
const ctx = canvas.getContext("2d");
let W,H,DPR=1;
function resize(){
    DPR=Math.min(window.devicePixelRatio||1, 3); // 最大3倍まで（高DPRデバイス対応）
    W=innerWidth; H=innerHeight;
    canvas.width=Math.round(W*DPR);
    canvas.height=Math.round(H*DPR);
    canvas.style.width=W+'px';
    canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0); // 全描画をDPRスケールで統一
}

/* ===== AUDIO ENGINE ===== */
let audioCtx = null;
let _bgmVolScale=0.40;
let _seVolScale=0.60;
// BGM state
let bgmGain=null, bgmRunning=false, bgmOscs=[], bgmScheduler=null;
let bgmMode='title'; // 'title' or 'game'
let gameBgmVariant=0; // 0=緊張感BGM(新), 1=従来BGM

// ─── タイトル BGM (Am-F-C-G, BPM=128, 穏やか) ───
const TITLE_BGM_BPM = 128;
const TITLE_CHORD_DUR = (60/TITLE_BGM_BPM)*4;
const TITLE_CHORDS = [
    [220, 261.6, 329.6],   // Am
    [174.6, 220, 261.6],   // F
    [130.8, 164.8, 196.0], // C
    [196.0, 246.9, 293.7], // G
];
const TITLE_BASS = [220, 174.6, 130.8, 196.0];
const TITLE_MELODY = [
    [440,0,523,0,494,0,440,0],
    [349,0,392,0,440,0,349,0],
    [262,0,330,0,392,0,330,0],
    [392,0,440,0,494,0,440,0],
];

// ─── ゲーム中 BGM A (緊張感 Em進行, BPM=158) ───
const GAME_BGM_BPM = 158;
const GAME_CHORD_DUR = (60/GAME_BGM_BPM)*4;
const GAME_CHORDS = [
    [164.8, 196.0, 246.9], // Em
    [146.8, 174.6, 220.0], // Dm
    [110.0, 130.8, 164.8], // Am
    [123.5, 155.6, 185.0], // B
];
const GAME_BASS = [82.4, 73.4, 55.0, 61.7]; // E2, D2, A1, B1

function startBGM(mode){
    if(bgmRunning) stopBGM();
    bgmMode = mode||bgmMode;
    bgmRunning = true;
    const ac = getAC();
    bgmGain = ac.createGain();
    bgmGain.gain.value = 0.22*_bgmVolScale*2.5;
    bgmGain.connect(ac.destination);

    if(bgmMode==='title'){
        _scheduleTitleBGM(ac);
    } else {
        if(gameBgmVariant===0) _scheduleGameBGM_A(ac);
        else _scheduleTitleBGM_asGame(ac);
    }
}

function _scheduleTitleBGM(ac){
    let beat=0;
    const beatDur=60/TITLE_BGM_BPM;
    let nextBeatTime=ac.currentTime+0.05;
    function scheduleBeat(){
        if(!bgmRunning)return;
        const chordIdx=Math.floor(beat/4)%TITLE_CHORDS.length;
        const chord=TITLE_CHORDS[chordIdx];
        const beatInChord=beat%4;
        if(beatInChord===0){
            chord.forEach((f,i)=>{
                const osc=ac.createOscillator(),g=ac.createGain();
                osc.type=i===0?'triangle':'sine';
                osc.frequency.value=f;
                const vol=[0.18,0.13,0.10][i];
                g.gain.setValueAtTime(0,nextBeatTime);
                g.gain.linearRampToValueAtTime(vol,nextBeatTime+0.04);
                g.gain.setValueAtTime(vol*0.7,nextBeatTime+TITLE_CHORD_DUR*0.6);
                g.gain.linearRampToValueAtTime(0,nextBeatTime+TITLE_CHORD_DUR*0.95);
                osc.connect(g);g.connect(bgmGain);
                osc.start(nextBeatTime);osc.stop(nextBeatTime+TITLE_CHORD_DUR+0.05);
            });
        }
        if(beatInChord===0||beatInChord===2){
            const bf=TITLE_BASS[chordIdx]*(beatInChord===2?1.5:1);
            const osc=ac.createOscillator(),g=ac.createGain();
            osc.type='square';osc.frequency.value=bf/2;
            g.gain.setValueAtTime(0,nextBeatTime);
            g.gain.linearRampToValueAtTime(0.22,nextBeatTime+0.01);
            g.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+beatDur*0.7);
            osc.connect(g);g.connect(bgmGain);
            osc.start(nextBeatTime);osc.stop(nextBeatTime+beatDur*0.8);
        }
        {
            const len=Math.ceil(ac.sampleRate*0.04),buf=ac.createBuffer(1,len,ac.sampleRate);
            const dd=buf.getChannelData(0);for(let i=0;i<len;i++)dd[i]=Math.random()*2-1;
            const src=ac.createBufferSource(),filt=ac.createBiquadFilter(),g=ac.createGain();
            src.buffer=buf;filt.type='highpass';filt.frequency.value=8000;
            const hhVol=(beatInChord===0||beatInChord===2)?0.07:0.04;
            g.gain.setValueAtTime(hhVol,nextBeatTime);
            g.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+0.04);
            src.connect(filt);filt.connect(g);g.connect(bgmGain);
            src.start(nextBeatTime);src.stop(nextBeatTime+0.05);
        }
        if(beatInChord===0){
            const osc=ac.createOscillator(),g=ac.createGain();
            osc.type='sine';
            osc.frequency.setValueAtTime(160,nextBeatTime);
            osc.frequency.exponentialRampToValueAtTime(40,nextBeatTime+0.12);
            g.gain.setValueAtTime(0.35,nextBeatTime);
            g.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+0.25);
            osc.connect(g);g.connect(bgmGain);
            osc.start(nextBeatTime);osc.stop(nextBeatTime+0.3);
        }
        if(beatInChord===2){
            const len=Math.ceil(ac.sampleRate*0.18),buf=ac.createBuffer(1,len,ac.sampleRate);
            const dd=buf.getChannelData(0);for(let i=0;i<len;i++)dd[i]=Math.random()*2-1;
            const src=ac.createBufferSource(),filt=ac.createBiquadFilter(),g=ac.createGain();
            src.buffer=buf;filt.type='bandpass';filt.frequency.value=1800;filt.Q.value=0.8;
            g.gain.setValueAtTime(0.18,nextBeatTime);
            g.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+0.18);
            src.connect(filt);filt.connect(g);g.connect(bgmGain);
            src.start(nextBeatTime);src.stop(nextBeatTime+0.2);
            const o2=ac.createOscillator(),g2=ac.createGain();
            o2.type='triangle';o2.frequency.value=240;
            g2.gain.setValueAtTime(0.08,nextBeatTime);
            g2.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+0.1);
            o2.connect(g2);g2.connect(bgmGain);
            o2.start(nextBeatTime);o2.stop(nextBeatTime+0.12);
        }
        const melChord=Math.floor(beat/4)%TITLE_MELODY.length;
        const melBeat=beat%4;
        const mf=TITLE_MELODY[melChord][melBeat*2];
        if(mf){
            const osc=ac.createOscillator(),g=ac.createGain();
            osc.type='triangle';osc.frequency.value=mf;
            g.gain.setValueAtTime(0,nextBeatTime);
            g.gain.linearRampToValueAtTime(0.12,nextBeatTime+0.02);
            g.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+beatDur*0.7);
            osc.connect(g);g.connect(bgmGain);
            osc.start(nextBeatTime);osc.stop(nextBeatTime+beatDur*0.75);
        }
        nextBeatTime+=beatDur; beat++;
        bgmScheduler=setTimeout(scheduleBeat,(nextBeatTime-ac.currentTime-0.05)*1000);
    }
    scheduleBeat();
}

// ゲーム中BGM variant=1 は従来BGMを再利用
function _scheduleTitleBGM_asGame(ac){ _scheduleTitleBGM(ac); }

// ゲーム中BGM A: Em-Dm-Am-B 短調 BPM=158 緊張感
function _scheduleGameBGM_A(ac){
    let beat=0;
    const beatDur=60/GAME_BGM_BPM;
    let nextBeatTime=ac.currentTime+0.05;

    // アルペジオパターン（各コードの音を順に鳴らす）
    const ARP = [
        [164.8,246.9,329.6,246.9, 196.0,246.9,329.6,393.7],
        [146.8,220.0,293.7,220.0, 174.6,220.0,293.7,349.2],
        [110.0,164.8,220.0,164.8, 130.8,164.8,220.0,261.6],
        [123.5,185.0,246.9,185.0, 146.8,185.0,246.9,293.7],
    ];

    function scheduleBeat(){
        if(!bgmRunning)return;
        const chordIdx=Math.floor(beat/4)%GAME_CHORDS.length;
        const beatInChord=beat%4;
        const bf=GAME_BASS[chordIdx];
        const halfBeat=beatDur/2;

        // ── キック（4つ打ち） ──
        {
            const osc=ac.createOscillator(),g=ac.createGain();
            osc.type='sine';
            osc.frequency.setValueAtTime(180,nextBeatTime);
            osc.frequency.exponentialRampToValueAtTime(38,nextBeatTime+0.09);
            g.gain.setValueAtTime(0.45,nextBeatTime);
            g.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+0.18);
            osc.connect(g);g.connect(bgmGain);
            osc.start(nextBeatTime);osc.stop(nextBeatTime+0.2);
        }

        // ── スネア（2・4拍目） ──
        if(beatInChord===1||beatInChord===3){
            const len=Math.ceil(ac.sampleRate*0.12),buf=ac.createBuffer(1,len,ac.sampleRate);
            const dd=buf.getChannelData(0);for(let i=0;i<len;i++)dd[i]=Math.random()*2-1;
            const src=ac.createBufferSource(),filt=ac.createBiquadFilter(),g=ac.createGain();
            src.buffer=buf;filt.type='bandpass';filt.frequency.value=2200;filt.Q.value=0.6;
            g.gain.setValueAtTime(0.22,nextBeatTime);
            g.gain.exponentialRampToValueAtTime(0.0001,nextBeatTime+0.12);
            src.connect(filt);filt.connect(g);g.connect(bgmGain);
            src.start(nextBeatTime);src.stop(nextBeatTime+0.14);
        }

        // ── ハイハット（8分音符×2） ──
        for(let hh=0;hh<2;hh++){
            const ht=nextBeatTime+hh*halfBeat;
            const len=Math.ceil(ac.sampleRate*0.025),buf=ac.createBuffer(1,len,ac.sampleRate);
            const dd=buf.getChannelData(0);for(let i=0;i<len;i++)dd[i]=Math.random()*2-1;
            const src=ac.createBufferSource(),filt=ac.createBiquadFilter(),g=ac.createGain();
            src.buffer=buf;filt.type='highpass';filt.frequency.value=9000;
            g.gain.setValueAtTime(hh===0?0.09:0.05,ht);
            g.gain.exponentialRampToValueAtTime(0.0001,ht+0.025);
            src.connect(filt);filt.connect(g);g.connect(bgmGain);
            src.start(ht);src.stop(ht+0.03);
        }

        // ── ベース（1・3拍目に低音刻み） ──
        if(beatInChord===0||beatInChord===2){
            for(let bb=0;bb<2;bb++){
                const bt=nextBeatTime+bb*halfBeat*0.5;
                const osc=ac.createOscillator(),g=ac.createGain();
                osc.type='sawtooth';osc.frequency.value=bf*(bb===0?1:1.5);
                g.gain.setValueAtTime(0,bt);
                g.gain.linearRampToValueAtTime(0.28,bt+0.01);
                g.gain.exponentialRampToValueAtTime(0.0001,bt+beatDur*0.45);
                osc.connect(g);g.connect(bgmGain);
                osc.start(bt);osc.stop(bt+beatDur*0.5);
            }
        }

        // ── アルペジオ（全拍で2音） ──
        const arpChord=ARP[chordIdx];
        const arpBase=beatInChord*2;
        for(let ai=0;ai<2;ai++){
            const at=nextBeatTime+ai*halfBeat;
            const freq=arpChord[(arpBase+ai)%arpChord.length];
            const osc=ac.createOscillator(),g=ac.createGain();
            osc.type='triangle';osc.frequency.value=freq;
            g.gain.setValueAtTime(0,at);
            g.gain.linearRampToValueAtTime(0.10,at+0.015);
            g.gain.exponentialRampToValueAtTime(0.0001,at+halfBeat*0.85);
            osc.connect(g);g.connect(bgmGain);
            osc.start(at);osc.stop(at+halfBeat*0.9);
        }

        // ── テンション音（1拍目のみ、コードの5th音を高め） ──
        if(beatInChord===0){
            const tfreq=GAME_CHORDS[chordIdx][2]*2;
            const osc=ac.createOscillator(),g=ac.createGain();
            osc.type='sine';osc.frequency.value=tfreq;
            g.gain.setValueAtTime(0,nextBeatTime);
            g.gain.linearRampToValueAtTime(0.07,nextBeatTime+0.03);
            g.gain.linearRampToValueAtTime(0.03,nextBeatTime+GAME_CHORD_DUR*0.7);
            g.gain.linearRampToValueAtTime(0,nextBeatTime+GAME_CHORD_DUR*0.98);
            osc.connect(g);g.connect(bgmGain);
            osc.start(nextBeatTime);osc.stop(nextBeatTime+GAME_CHORD_DUR+0.05);
        }

        nextBeatTime+=beatDur; beat++;
        bgmScheduler=setTimeout(scheduleBeat,(nextBeatTime-ac.currentTime-0.05)*1000);
    }
    scheduleBeat();
}

function setBgmVol(v){
    _bgmVolScale=v/100;
    document.getElementById('vol-bgm-val').textContent=v;
    if(bgmGain) bgmGain.gain.value=0.22*_bgmVolScale*2.5;
}
function setSeVol(v){
    _seVolScale=v/100;
    document.getElementById('vol-se-val').textContent=v;
}

function getAC(){
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
}

// SE用gainノード（マスターSE音量適用）
function mg(vol){
    const ac=getAC(), g=ac.createGain();
    g.gain.value=vol*_seVolScale*1.67; g.connect(ac.destination); return g;
}
function tone({freq=440,type='sine',vol=0.3,atk=0.005,dec=0.1,sus=0,dur=0.15,detune=0,dest=null}={}){
    try{
        const ac=getAC(), out=dest||ac.destination;
        const g=ac.createGain(), osc=ac.createOscillator();
        osc.type=type; osc.frequency.value=freq; osc.detune.value=detune;
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(vol,ac.currentTime+atk);
        g.gain.linearRampToValueAtTime(sus*vol,ac.currentTime+atk+dec);
        g.gain.linearRampToValueAtTime(0,ac.currentTime+dur);
        osc.connect(g); g.connect(out);
        osc.start(ac.currentTime); osc.stop(ac.currentTime+dur+0.02);
    }catch(e){}
}
function noise({vol=0.2,dur=0.1,ff=800,fq=1,ft='bandpass',atk=0.002,dest=null}={}){
    try{
        const ac=getAC(), out=dest||ac.destination;
        const len=Math.ceil(ac.sampleRate*dur), buf=ac.createBuffer(1,len,ac.sampleRate);
        const d=buf.getChannelData(0); for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
        const src=ac.createBufferSource(), filt=ac.createBiquadFilter(), g=ac.createGain();
        src.buffer=buf; filt.type=ft; filt.frequency.value=ff; filt.Q.value=fq;
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(vol,ac.currentTime+atk);
        g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
        src.connect(filt); filt.connect(g); g.connect(out);
        src.start(); src.stop(ac.currentTime+dur+0.02);
    }catch(e){}
}

/* ===== INPUT ===== */
canvas.addEventListener("pointerdown",handleDown);
canvas.addEventListener("pointermove",handleMove);
canvas.addEventListener("pointerup",handleUp);

function toWorld(e){
    // スクリーン座標 → world座標
    // w2sx(wx) = W/2 + wx * scale  →  wx = (screenX - W/2) / scale
    const FSH = Math.min(W,H) * 0.45;
    const scale = FSH / fieldSize;
    const r=canvas.getBoundingClientRect();
    return{
        mx:(e.clientX-r.left-W/2)/scale,
        my:(e.clientY-r.top-H/2)/scale
    };
}
function handleDown(e){
    if(!running)return;
    const{mx,my}=toWorld(e);
    if(charType===0){tx=mx;ty=my;clickMove=true; sfxClick();}
    if(charType===1){touchStartX=mx;touchStartY=my;swiperMoving=true;_swiperHasMoved=false;}
    if(charType===2){anchorPressed=true; sfxAnchorOn();const dx = mx;const dy = my;anchorTargetAngle = Math.atan2(dy, dx);}
    if(charType===3){orbiterCenterX=mx;orbiterCenterY=my;}
    if(charType===4){
        // ワープ: CDが空いていればクリック位置へ瞬間移動
        if(warperCD<=0){
            const limit=fieldSize-10;
            const wx=Math.max(-limit,Math.min(limit,mx));
            const wy=Math.max(-limit,Math.min(limit,my));
            // テレポートエフェクト（出発地点）
            spawnShockwave(player.x,player.y,'rgba(255,200,0');
            spawnParticles(player.x,player.y,12,'#fc0',6,35);
            player.x=wx; player.y=wy;
            // テレポートエフェクト（到着地点）
            spawnShockwave(player.x,player.y,'rgba(255,220,80');
            spawnParticles(player.x,player.y,16,'#fe8',7,40);
            warperCD=WARPER_CD_MAX;
            sfxTeleportLand();
        }
    }
}
function handleMove(e){
    if(!running)return;
    const{mx,my}=toWorld(e);
    if(charType===1&&swiperMoving){
        const dx=mx-touchStartX,dy=my-touchStartY;
        if(Math.hypot(dx,dy)>5){
            if(!_swiperHasMoved){ _swiperHasMoved=true; sfxSwipe(); }
            swiperAngle=Math.atan2(dy,dx);
        }
    }
    if(charType===2 && e.buttons){
    const dx = mx;  // もし中心が(0,0)ならそのままでOK
    const dy = my;
    anchorTargetAngle = Math.atan2(dy, dx);
    }
    if(charType===3){orbiterCenterX=mx;orbiterCenterY=my;}
}
function handleUp(e){
    if(!running)return;
    if(charType===1){swiperMoving=false;player.angle=swiperAngle;}
    if(charType===2){anchorPressed=false; sfxAnchorOff();}
}

const rand=(a,b)=>Math.random()*(b-a)+a;

/* ===== PARTICLES ===== */
function spawnParticles(x,y,n,color,speed=4,life=40){
    for(let i=0;i<n;i++){
        const a=Math.random()*Math.PI*2;
        const s=Math.random()*speed;
        particles.push({
            x,y,
            vx:Math.cos(a)*s,
            vy:Math.sin(a)*s,
            life,maxLife:life,
            size:Math.random()*3+1,
            color
        });
    }
}
function spawnShockwave(x,y,color='rgba(0,255,255'){
    shockwaves.push({x,y,r:0,maxR:60,life:20,maxLife:20,color});
}
/* ===== ENEMY SPAWN ===== */
function spawnEnemy(maxType){
    const a = Math.random() * Math.PI * 2;
    // ===== 重み付き抽選 =====
    const weights = [];
    for(let i = 0; i <= maxType; i++){
        if(i === 1){
            weights.push(0.8);
        }else if(i === 3){
            weights.push(1.2);
        }else if(i === 6){
            weights.push(0.9);
        }else if(i === 7){
            weights.push(0.7);
        }else if(i === 8){
            weights.push(0.8);
        }else if(i === 9){
            weights.push(0.85); // ボマー
        }else if(i === 10){
            weights.push(0.6);  // ウォール（フィールド分断なので稀)
        }else if(i === 11){
            weights.push(0.75); // ボルテックス
        }else if(i === 12){
            weights.push(0.7);  // レーザー
        }
        else{
            weights.push(1.0);
        }
    }
    const type = weightedRandom(weights);
    spawn(type, a);
    // ===== 追加スポーンの処理 =====
    const CHAIN_TYPE = 3;
    const CHAIN_CHANCE = 0.5;
    const CHAIN_MAX = 3;
    if(type === CHAIN_TYPE){
        if(Math.random() < CHAIN_CHANCE){
            const count = Math.floor(Math.random() * CHAIN_MAX) + 1; // 1～4体
            for(let i=0;i<count;i++){
                spawn(CHAIN_TYPE, a);
            }
        }
    }
}
// ===== 重み付きランダム =====
function weightedRandom(weights){
    const total = weights.reduce((a,b)=>a+b,0);
    let r = Math.random() * total;
    for(let i=0;i<weights.length;i++){
        if(r < weights[i]) return i;
        r -= weights[i];
    }
    return 0;
}
// ===== 共通スポーン処理 =====
function spawn(type, baseAngle){

        vx: 0,

        cd: 0,
        cdMax: [0,120,160,0,0,200,200,0,200,180,0,240,220][type]||0,
        preview: null,
        spawnFlash: 90
    });
    sfxEnemySpawn();
}
